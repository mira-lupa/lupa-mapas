h3","lines":"117,118"}},{"content":"3.2 Classifica&#xe7;&#xe3;o dos Vest&#xed;gios [Prioridade B]","children":[{"content":"Quanto &#xe0; natureza","children":[{"content":"<strong>Biol&#xf3;gicos:</strong> sangue, s&#xea;men, saliva, cabelos, DNA, pele, ossos","children":[],"payload":{"tag":"li","lines":"130,131"}},{"content":"<strong>F&#xed;sicos:</strong> impress&#xf5;es digitais, pegadas, marcas de ferramentas, fragmentos","children":[],"payload":{"tag":"li","lines":"131,132"}},{"content":"<strong>Qu&#xed;micos:</strong> drogas, acelerantes de inc&#xea;ndio, venenos, GSR (res&#xed;duo de disparo)","children":[],"payload":{"tag":"li","lines":"132,133"}},{"content":"<strong>Digitais:</strong> dados em dispositivos eletr&#xf4;nicos, metadados, registros de acesso","children":[],"payload":{"tag":"li","lines":"133,134"}},{"content":"<strong>Documentais:</strong> documentos f&#xed;sicos, assinaturas, c&#xe9;dulas falsas","children":[],"payload":{"tag":"li","lines":"134,136"}}],"payload":{"tag":"h4","lines":"129,130"}},{"content":"Quanto &#xe0; visibilidade","children":[{"content":"<strong>Vis&#xed;veis (patentes):</strong> percept&#xed;veis a olho nu sem tratamento especial","children":[],"payload":{"tag":"li","lines":"137,138"}},{"content":"<strong>Latentes:</strong> necessitam de t&#xe9;cnica para revela&#xe7;&#xe3;o (ex.: impress&#xe3;o digital latente)","children":[],"payload":{"tag":"li","lines":"138,139"}},{"content":"<strong>Pl&#xe1;sticos:</strong> impressos em material male&#xe1;vel (ex.: marca de sapato em lama)","children":[],"payload":{"tag":"li","lines":"139,141"}}],"payload":{"tag":"h4","lines":"136,137"}},{"content":"Quanto ao valor probat&#xf3;rio","children":[{"content":"<strong>Determinantes:</strong> isoladamente suficientes para individualiza&#xe7;&#xe3;o (DNA, impress&#xe3;o digital)","children":[],"payload":{"tag":"li","lines":"142,143"}},{"content":"<strong>Circunstanciais:</strong> contribuem mas n&#xe3;o individualizam sozinhos (fibras, p&#xf3;)","children":[],"payload":{"tag":"li","lines":"143,145"}}],"payload":{"tag":"h4","lines":"141,142"}}],"payload":{"tag":"h3","lines":"127,128"}},{"content":"3.3 Manejo dos Vest&#xed;gios [Prioridade A]","children":[{"content":"EPI obrigat&#xf3;rio: luvas, m&#xe1;scara, &#xf3;culos, jaleco &#x2014; impede contamina&#xe7;&#xe3;o cruzada e protege o perito","children":[],"payload":{"tag":"li","lines":"146,147"}},{"content":"Embalagem adequada ao tipo: papel (biol&#xf3;gicos &#x2014; permite transpira&#xe7;&#xe3;o), pl&#xe1;stico (objetos s&#xf3;lidos secos), tubos herm&#xe9;ticos (l&#xed;quidos)","children":[],"payload":{"tag":"li","lines":"147,148"}},{"content":"Etiquetagem: n&#xfa;mero de vest&#xed;gio, local exato de coleta, data/hora, coletor respons&#xe1;vel, n&#xfa;mero do laudo","children":[],"payload":{"tag":"li","lines":"148,149"}},{"content":"Lacre: inviol&#xe1;vel, numerado &#x2014; identifica&#xe7;&#xe3;o de adultera&#xe7;&#xe3;o posterior","children":[],"payload":{"tag":"li","lines":"149,151"}}],"payload":{"tag":"h3","lines":"145,146"}}],"payload":{"tag":"h2","lines":"115,116"}},{"content":"4. LAUDO PERICIAL [Prioridade A]","children":[{"content":"4.1 Conceito e Natureza Jur&#xed;dica [Prioridade A]","children":[{"content":"Laudo = documento t&#xe9;cnico-cient&#xed;fico que registra os trabalhos periciais e suas conclus&#xf5;es","children":[],"payload":{"tag":"li","lines":"156,157"}},{"content":"Natureza: prova t&#xe9;cnica &#x2014; n&#xe3;o vincula o juiz (art. 182 CPP: &quot;o juiz n&#xe3;o est&#xe1; adstrito ao laudo&quot;)","children":[],"payload":{"tag":"li","lines":"157,158"}},{"content":"Caracter&#xed;stica central: OBJETIVIDADE &#x2014; descreve fatos, n&#xe3;o opini&#xf5;es subjetivas","children":[],"payload":{"tag":"li","lines":"158,160"}}],"payload":{"tag":"h3","lines":"155,156"}},{"content":"4.2 Estrutura do Laudo [Prioridade A]","children":[{"content":"Elementos obrigat&#xf3;rios","children":[{"content":"1. <strong>Pre&#xe2;mbulo:</strong> identifica&#xe7;&#xe3;o do perito, qualifica&#xe7;&#xe3;o, refer&#xea;ncia ao procedimento que determinou a per&#xed;cia","children":[],"payload":{"tag":"li","lines":"163,164","listIndex":1}},{"content":"2. <strong>Hist&#xf3;rico:</strong> relato do que originou o exame (BO, requisi&#xe7;&#xe3;o, portaria)","children":[],"payload":{"tag":"li","lines":"164,165","listIndex":2}},{"content":"3. <strong>Material examinado:</strong> descri&#xe7;&#xe3;o minuciosa do objeto submetido a exame","children":[],"payload":{"tag":"li","lines":"165,166","listIndex":3}},{"content":"4. <strong>Considera&#xe7;&#xf5;es t&#xe9;cnicas / Discuss&#xe3;o:</strong> an&#xe1;lise cient&#xed;fica, m&#xe9;todo empregado, normas t&#xe9;cnicas aplicadas","children":[],"payload":{"tag":"li","lines":"166,167","listIndex":4}},{"content":"5. <strong>Conclus&#xe3;o (quesitos):</strong> resposta objetiva aos quesitos formulados","children":[],"payload":{"tag":"li","lines":"167,168","listIndex":5}},{"content":"6. <strong>Data, local, assinaturas</strong>","children":[],"payload":{"tag":"li","lines":"168,170","listIndex":6}}],"payload":{"tag":"h4","lines":"162,163"}},{"content":"Pontos-chave (apostas banca)","children":[{"content":"Laudo deve ter <strong>dois peritos oficiais</strong> (art. 159 CPP) &#x2014; regra","children":[],"payload":{"tag":"li","lines":"171,172"}},{"content":"Perito &#xfa;nico = exce&#xe7;&#xe3;o: aus&#xea;ncia de perito oficial na comarca OU urg&#xea;ncia devidamente justificada","children":[],"payload":{"tag":"li","lines":"172,173"}},{"content":"Laudo complementar: quando o laudo original for omisso ou insuficiente (art. 181 CPP)","children":[],"payload":{"tag":"li","lines":"173,174"}},{"content":"Laudo provis&#xf3;rio: emitido antes de todos os exames serem conclu&#xed;dos (ex.: laudo de local)","children":[],"payload":{"tag":"li","lines":"174,175"}},{"content":"<strong>Prazo:</strong> 10 dias (prorrog&#xe1;vel por autoriza&#xe7;&#xe3;o judicial) &#x2014; art. 160 CPP","children":[],"payload":{"tag":"li","lines":"175,177"}}],"payload":{"tag":"h4","lines":"170,171"}}],"payload":{"tag":"h3","lines":"160,161"}},{"content":"4.3 Independ&#xea;ncia do Perito [Prioridade A]","children":[{"content":"Perito oficial n&#xe3;o est&#xe1; sujeito &#xe0; autoridade do delegado em suas conclus&#xf5;es t&#xe9;cnicas","children":[],"payload":{"tag":"li","lines":"178,179"}},{"content":"Pode ser contradito (art. 165 CPP) mas n&#xe3;o substitu&#xed;do por discord&#xe2;ncia da autoridade","children":[],"payload":{"tag":"li","lines":"179,180"}},{"content":"Assistente t&#xe9;cnico: indicado pelas partes (acusa&#xe7;&#xe3;o/defesa) &#x2014; n&#xe3;o &#xe9; perito oficial","children":[],"payload":{"tag":"li","lines":"180,181"}},{"content":"Diverg&#xea;ncia entre peritos: cada um assina laudo separado; juiz decide","children":[],"payload":{"tag":"li","lines":"181,183"}}],"payload":{"tag":"h3","lines":"177,178"}}],"payload":{"tag":"h2","lines":"153,154"}},{"content":"5. CADEIA DE CUST&#xd3;DIA [Prioridade A &#x2014; APOSTA M&#xc1;XIMA]","children":[{"content":"5.1 Conceito e Base Legal [Prioridade A]","children":[{"content":"<strong>Base legal:</strong> Arts. 158-A a 158-F do CPP (inseridos pela Lei 13.964/2019 &#x2014; Pacote Anticrime)","children":[],"payload":{"tag":"li","lines":"191,192"}},{"content":"<strong>Art. 158-A:</strong> &quot;Considera-se cadeia de cust&#xf3;dia o conjunto de todos os procedimentos utilizados para manter e documentar a hist&#xf3;ria cronol&#xf3;gica do vest&#xed;gio coletado em locais ou em v&#xed;timas de crimes, para rastrear sua posse e manuseio a partir de seu reconhecimento at&#xe9; o descarte&quot;","children":[],"payload":{"tag":"li","lines":"192,193"}},{"content":"Finalidade: garantir autenticidade, integridade e rastreabilidade do vest&#xed;gio","children":[],"payload":{"tag":"li","lines":"193,195"}}],"payload":{"tag":"h3","lines":"190,191"}},{"content":"5.2 As 10 Etapas do Art. 158-B [Prioridade A &#x2014; APOSTA M&#xc1;XIMA]","children":[{"content":"Pontos-chave (apostas m&#xe1;ximas)","children":[{"content":"A cadeia inicia no RECONHECIMENTO &#x2014; antes da coleta","children":[],"payload":{"tag":"li","lines":"211,212"}},{"content":"Cada transfer&#xea;ncia de cust&#xf3;dia deve ser documentada com assinatura","children":[],"payload":{"tag":"li","lines":"212,213"}},{"content":"Quebra da cadeia = questionamento da validade do vest&#xed;gio como prova","children":[],"payload":{"tag":"li","lines":"213,214"}},{"content":"Art. 158-D: o recipiente do vest&#xed;gio deve ser lacrado com etiqueta contendo: nome, matr&#xed;cula, data, hora, local, n&#xfa;mero de refer&#xea;ncia","children":[],"payload":{"tag":"li","lines":"214,215"}},{"content":"Art. 158-E: central de cust&#xf3;dia &#x2014; cada Instituto deve ter; vest&#xed;gios ficam armazenados sob controle","children":[],"payload":{"tag":"li","lines":"215,216"}},{"content":"Art. 158-F: licita&#xe7;&#xe3;o/descarte do vest&#xed;gio apreendido &#x2014; prazo m&#xed;nimo ap&#xf3;s tr&#xe2;nsito em julgado","children":[],"payload":{"tag":"li","lines":"216,218"}}],"payload":{"tag":"h4","lines":"210,211"}}],"payload":{"tag":"h3","lines":"195,196"}},{"content":"5.3 Consequ&#xea;ncias da Quebra da Cadeia [Prioridade A]","children":[{"content":"Vest&#xed;gio torna-se contest&#xe1;vel como prova","children":[],"payload":{"tag":"li","lines":"219,220"}},{"content":"N&#xe3;o implica automaticamente nulidade do processo &#x2014; o juiz avalia no conjunto probat&#xf3;rio","children":[],"payload":{"tag":"li","lines":"220,221"}},{"content":"Pode gerar responsabilidade funcional do servidor respons&#xe1;vel pela guarda","children":[],"payload":{"tag":"li","lines":"221,223"}}],"payload":{"tag":"h3","lines":"218,219"}}],"payload":{"tag":"h2","lines":"188,189"}},{"content":"6. EXAME DE CORPO DE DELITO [Prioridade A]","children":[{"content":"6.1 Conceito e Obrigatoriedade [Prioridade A]","children":[{"content":"<strong>Corpo de delito:</strong> conjunto de elementos materiais que comprovam a exist&#xea;ncia do crime","children":[],"payload":{"tag":"li","lines":"231,232"}},{"content":"<strong>Exame de corpo de delito:</strong> per&#xed;cia t&#xe9;cnica que verifica e documenta esses elementos","children":[],"payload":{"tag":"li","lines":"232,233"}},{"content":"<strong>Art. 158 CPP:</strong> &quot;Quando a infra&#xe7;&#xe3;o deixar vest&#xed;gios, ser&#xe1; indispens&#xe1;vel o exame de corpo de delito...&quot;","children":[],"payload":{"tag":"li","lines":"233,235"}}],"payload":{"tag":"h3","lines":"230,231"}},{"content":"6.2 Direto vs. Indireto [Prioridade A]","children":[{"content":"<table data-lines=\"237,241\">\n<thead data-lines=\"237,238\">\n<tr data-lines=\"237,238\">\n<th>Tipo</th>\n<th>Descri&#xe7;&#xe3;o</th>\n<th>Quando se aplica</th>\n</tr>\n</thead>\n<tbody data-lines=\"239,241\">\n<tr data-lines=\"239,240\">\n<td><strong>Direto</strong></td>\n<td>Exame do pr&#xf3;prio vest&#xed;gio material</td>\n<td>Vest&#xed;gio ainda existe e pode ser examinado</td>\n</tr>\n<tr data-lines=\"240,241\">\n<td><strong>Indireto</strong></td>\n<td>Exame com base em elementos secund&#xe1;rios (prontu&#xe1;rios, fotos, documentos)</td>\n<td>Vest&#xed;gio desapareceu ou &#xe9; de dif&#xed;cil acesso</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"237,241"}}],"payload":{"tag":"h3","lines":"235,236"}},{"content":"6.3 Prova Testemunhal como Suced&#xe2;neo [Prioridade A &#x2014; PEGADINHA]","children":[{"content":"<strong>Art. 167 CPP:</strong> &quot;N&#xe3;o sendo poss&#xed;vel o exame de corpo de delito, por haverem desaparecido os vest&#xed;gios, a prova testemunhal poder&#xe1; suprir-lhe a falta&quot;","children":[],"payload":{"tag":"li","lines":"243,244"}},{"content":"Condi&#xe7;&#xe3;o ESTRITA: o vest&#xed;gio deve ter DESAPARECIDO naturalmente ou por a&#xe7;&#xe3;o do agente","children":[],"payload":{"tag":"li","lines":"244,245"}},{"content":"N&#xc3;O supre se o vest&#xed;gio desapareceu por neglig&#xea;ncia das autoridades (STJ &#x2014; posi&#xe7;&#xe3;o dominante)","children":[],"payload":{"tag":"li","lines":"245,246"}},{"content":"N&#xc3;O &#xe9; op&#xe7;&#xe3;o alternativa &#x2014; &#xe9; &#xfa;ltimo recurso","children":[],"payload":{"tag":"li","lines":"246,248"}}],"payload":{"tag":"h3","lines":"242,243"}},{"content":"6.4 Crimes N&#xe3;o Transeunte vs. Transeunte [Prioridade B]","children":[{"content":"<strong>Delito n&#xe3;o transeunte (de fato permanente):</strong> deixa vest&#xed;gios &#x2014; exame de corpo de delito OBRIGAT&#xd3;RIO","children":[],"payload":{"tag":"li","lines":"252,253"}},{"content":"<strong>Delito transeunte (de fato passageiro):</strong> n&#xe3;o deixa vest&#xed;gios materiais &#x2014; exame n&#xe3;o &#xe9; exigido (ex.: inj&#xfa;ria verbal, amea&#xe7;a oral)","children":[],"payload":{"tag":"li","lines":"253,255"}}],"payload":{"tag":"h3","lines":"251,252"}}],"payload":{"tag":"h2","lines":"228,229"}},{"content":"QUADRO RESUMO &#x2014; APOSTAS DO DETETIVE","children":[{"content":"<table data-lines=\"259,271\">\n<thead data-lines=\"259,260\">\n<tr data-lines=\"259,260\">\n<th>Aposta</th>\n<th>Base Legal</th>\n<th>Prioridade</th>\n</tr>\n</thead>\n<tbody data-lines=\"261,271\">\n<tr data-lines=\"261,262\">\n<td>10 etapas da cadeia de cust&#xf3;dia (Art. 158-B CPP)</td>\n<td>Lei 13.964/2019</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"262,263\">\n<td>Quem isola o local: 1&#xb0; policial (N&#xc3;O o perito)</td>\n<td>Art. 6&#xb0;, I, CPP</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"263,264\">\n<td>Laudo = 2 peritos; perito &#xfa;nico = exce&#xe7;&#xe3;o</td>\n<td>Art. 159 CPP</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"264,265\">\n<td>Prova testemunhal s&#xf3; supre se vest&#xed;gio DESAPARECEU</td>\n<td>Art. 167 CPP</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"265,266\">\n<td>Princ&#xed;pio de Locard &#x2014; troca m&#xfa;tua</td>\n<td>Doutrina (Criminal&#xed;stica)</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"266,
