, croqui, descri&#xe7;&#xe3;o escrita detalhada","children":[],"payload":{"tag":"li","lines":"51,52"}},{"content":"<strong>Ordem obrigat&#xf3;ria:</strong> fixa&#xe7;&#xe3;o ANTES de qualquer coleta","children":[],"payload":{"tag":"li","lines":"52,53"}},{"content":"Registra as condi&#xe7;&#xf5;es originais do vest&#xed;gio","children":[],"payload":{"tag":"li","lines":"53,55"}}],"payload":{"tag":"h3","lines":"49,50"}},{"content":"2.4 Etapa 4 &#x2014; Coleta [Prioridade A]","children":[{"content":"Recolhimento do vest&#xed;gio com t&#xe9;cnica adequada ao seu tipo","children":[],"payload":{"tag":"li","lines":"59,60"}},{"content":"<strong>Regra (Art. 158-C CPP):</strong> realizada por perito oficial","children":[],"payload":{"tag":"li","lines":"60,61"}},{"content":"<strong>Exce&#xe7;&#xe3;o:</strong> na aus&#xea;ncia de perito, por pessoa id&#xf4;nea autorizada pela autoridade","children":[],"payload":{"tag":"li","lines":"61,62"}},{"content":"EPI obrigat&#xf3;rio: luvas, m&#xe1;scara, &#xf3;culos, jaleco","children":[],"payload":{"tag":"li","lines":"62,63"}},{"content":"T&#xe9;cnica varia conforme o tipo: swab (biol&#xf3;gicos), pin&#xe7;a (s&#xf3;lidos), suabe seco (superf&#xed;cies)","children":[],"payload":{"tag":"li","lines":"63,65"}}],"payload":{"tag":"h3","lines":"58,59"}},{"content":"2.5 Etapa 5 &#x2014; Acondicionamento [Prioridade A]","children":[{"content":"Tipos de embalagem por vest&#xed;gio [Prioridade A &#x2014; PEGADINHA CL&#xc1;SSICA]","children":[{"content":"<strong>Biol&#xf3;gico &#xfa;mido</strong> (sangue fresco, saliva, s&#xea;men l&#xed;quido): <strong>PAPEL</strong> &#x2014; NUNCA pl&#xe1;stico (pl&#xe1;stico impede a secagem e degrada o DNA)","children":[],"payload":{"tag":"li","lines":"72,73"}},{"content":"<strong>Biol&#xf3;gico seco:</strong> papel ou pl&#xe1;stico","children":[],"payload":{"tag":"li","lines":"73,74"}},{"content":"<strong>Evid&#xea;ncia digital</strong> (HD, pen drive, celular): <strong>saco antiest&#xe1;tico</strong> (gaiola ent":"3. CENTRAL DE CUST&#xd3;DIA &#x2014; ART. 158-E [Prioridade A]","children":[{"content":"3.1 Obrigatoriedade e Estrutura [Prioridade A]","children":[{"content":"<strong>Toda</strong> institui&#xe7;&#xe3;o forense deve ter Central de Cust&#xf3;dia","children":[],"payload":{"tag":"li","lines":"113,114"}},{"content":"Gerenciada pelo <strong>&#xf3;rg&#xe3;o central de per&#xed;cia oficial</strong> de cada Estado/Uni&#xe3;o","children":[],"payload":{"tag":"li","lines":"114,115"}},{"content":"N&#xe3;o pode ser improvisada &#x2014; exige instala&#xe7;&#xf5;es adequadas","children":[],"payload":{"tag":"li","lines":"115,117"}}],"payload":{"tag":"h3","lines":"112,113"}},{"content":"3.2 Fun&#xe7;&#xf5;es da Central [Prioridade A]","children":[{"content":"Recebimento formal dos vest&#xed;gios coletados","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"Guarda e armazenamento controlado","children":[],"payload":{"tag":"li","lines":"119,120"}},{"content":"Disponibiliza&#xe7;&#xe3;o dos vest&#xed;gios para processamento laboratorial","children":[],"payload":{"tag":"li","lines":"120,121"}},{"content":"Registro sistematizado de todas as entradas e sa&#xed;das","children":[],"payload":{"tag":"li","lines":"121,122"}},{"content":"Controle de acesso: apenas pessoal autorizado","children":[],"payload":{"tag":"li","lines":"122,124"}}],"payload":{"tag":"h3","lines":"117,118"}}],"payload":{"tag":"h2","lines":"110,111"}},{"content":"4. CADEIA DE CUST&#xd3;DIA DIGITAL [Prioridade A]","children":[{"content":"4.1 Princ&#xed;pios da Per&#xed;cia Digital [Prioridade A]","children":[{"content":"<strong>Hash criptogr&#xe1;fico obrigat&#xf3;rio:</strong> MD5 ou SHA-256 &#x2014; garante integridade do arquivo (qualquer altera&#xe7;&#xe3;o muda o hash)","children":[],"payload":{"tag":"li","lines":"132,133"}},{"content":"<strong>Write-blocker obrigat&#xf3;rio</strong> na aquisi&#xe7;&#xe3;o: bloqueia escrita no dispositivo original durante a c&#xf3;pia","children":[],"payload":{"
