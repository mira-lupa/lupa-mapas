{"tag":"h4","lines":"44,45"}},{"content":"Fen&#xf4;menos Abi&#xf3;ticos Consecutivos (surgem nas primeiras 24h)","children":[{"content":"\n<p data-lines=\"50,51\"><strong>Resfriamento cadav&#xe9;rico (algor mortis):</strong></p>","children":[{"content":"Corpo perde temperatura at&#xe9; atingir a do ambiente","children":[],"payload":{"tag":"li","lines":"51,52"}},{"content":"Queda de ~1&#xb0;C/hora nas primeiras horas (regra de Henssge &#x2014; term&#xf4;metro retal)","children":[],"payload":{"tag":"li","lines":"52,53"}},{"content":"Fatores que aceleram: ambiente frio, crian&#xe7;a, corpo magro, nudez","children":[],"payload":{"tag":"li","lines":"53,54"}},{"content":"Fatores que retardam: ambiente quente, obeso, roupas, febre pr&#xe9;-morte","children":[],"payload":{"tag":"li","lines":"54,56"}}],"payload":{"tag":"li","lines":"50,56"}},{"content":"\n<p data-lines=\"56,57\"><strong>Livores cadav&#xe9;ricos (livor mortis):</strong></p>","children":[{"content":"Manchas arroxeadas onde o sangue se acumula por gravidade","children":[],"payload":{"tag":"li","lines":"57,58"}},{"content":"Surgem 1-2 horas ap&#xf3;s a morte; fixam-se entre 6-12 horas","children":[],"payload":{"tag":"li","lines":"58,59"}},{"content":"<strong>Fixados:</strong> n&#xe3;o mudam com mudan&#xe7;a de posi&#xe7;&#xe3;o &#x2014; morte h&#xe1; mais de 12h","children":[],"payload":{"tag":"li","lines":"59,60"}},{"content":"<strong>N&#xe3;o fixados:</strong> mudam com mudan&#xe7;a de posi&#xe7;&#xe3;o &#x2014; morte h&#xe1; menos de 6h","children":[],"payload":{"tag":"li","lines":"60,61"}},{"content":"Ausentes em: anemia severa, hemorragia maci&#xe7;a","children":[],"payload":{"tag":"li","lines":"61,62"}},{"content":"<strong>Aposta:</strong> localiza&#xe7;&#xe3;o dos livores revela posi&#xe7;&#xe3;o em que o corpo ficou ap&#xf3;s a morte &#x2014; contradi&#xe7;&#xe3;o com local de encontro sugere transporte do cad&#xe1;ver","children":[],"payload":{"tag":"li","lines":"62,64"}}],"payload":{"tag":"li","lines":"56,64"}},{"content":"\n<p data-lines=\"64,65\"><strong>Rigidez cadav&#xe9;rica (rigor mortis):</strong></p>","children":[{"content":"Enrijecimento progressivo dos m&#xfa;sculos por ac&#xfa;mulo de &#xe1;cido l&#xe1;tico","children":[],"payload":{"tag":"li","lines":"65,66"}},{"content":"<strong>Sequ&#xea;ncia:</strong> mand&#xed;bula &#x2192; pesco&#xe7;o &#x2192; tronco &#x2192; membros superiores &#x2192; membros inferiores (c&#xe9;falo-caudal)","children":[],"payload":{"tag":"li","lines":"66,67"}},{"content":"Instala&#xe7;&#xe3;o: come&#xe7;a 1-2h ap&#xf3;s a morte; completa entre 6-12h","children":[],"payload":{"tag":"li","lines":"67,68"}},{"content":"Dura&#xe7;&#xe3;o: mantida por 24-48h","children":[],"payload":{"tag":"li","lines":"68,69"}},{"content":"Desaparece na mesma ordem que surgiu (c&#xe9;falo-caudal)","children":[],"payload":{"tag":"li","lines":"69,70"}},{"content":"<strong>Espasmo cadav&#xe9;rico:</strong> rigidez instant&#xe2;nea no momento da morte &#x2014; raro &#x2014; indica morte violenta s&#xfa;bita (ex.: afogamento com vegeta&#xe7;&#xe3;o nas m&#xe3;os)","children":[],"payload":{"tag":"li","lines":"70,72"}}],"payload":{"tag":"li","lines":"64,72"}}],"payload":{"tag":"h4","lines":"49,50"}},{"content":"Tabela-Resumo: Fen&#xf4;menos &#xd7; Tempo","children":[{"content":"<table data-lines=\"74,80\">\n<thead data-lines=\"74,75\">\n<tr data-lines=\"74,75\">\n<th>Fen&#xf4;meno</th>\n<th>In&#xed;cio</th>\n<th>Fixa&#xe7;&#xe3;o/Pico</th>\n<th>Desaparece</th>\n</tr>\n</thead>\n<tbody data-lines=\"76,80\">\n<tr data-lines=\"76,77\">\n<td>Algor mortis</td>\n<td>Imediato</td>\n<td>~24h (temp. ambiente)</td>\n<td>&#x2014;</td>\n</tr>\n<tr data-lines=\"77,78\">\n<td>Livor mortis</td>\n<td>1-2h</td>\n<td>Fixado: 6-12h</td>\n<td>&#x2014;</td>\n</tr>\n<tr data-lines=\"78,79\">\n<td>Rigor mortis</td>\n<td>1-2h</td>\n<td>Completo: 6-12h</td>\n<td>24-48h</td>\n</tr>\n<tr data-lines=\"79,80\">\n<td>Putrefa&#xe7;&#xe3;o</td>\n<td>24-48h (frio)</td>\n<td>3-7 dias</td>\n<td>Semanas/meses</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"74,80"}}],"payload":{"tag":"h4","lines":"72,73"}}],"payload":{"tag":"h3","lines":"42,43"}},{"content":"2.3 Fen&#xf4;menos Cadav&#xe9;ricos Transformativos [Prioridade A]","children":[{"content":"Destrutivos (decomp&#xf5;em o corpo)","children":[{"content":"<strong>Putrefa&#xe7;&#xe3;o:</strong> decomposi&#xe7;&#xe3;o bacteriana &#x2014; 4 fases: crom&#xe1;tica (mancha verde na fossa il&#xed;aca direita) &#x2192; enfisematosa (gases, incha&#xe7;o) &#x2192; coliquativa (liquefa&#xe7;&#xe3;o) &#x2192; esqueletiza&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"87,88"}},{"content":"<strong>Aut&#xf3;lise:</strong> digest&#xe3;o enzim&#xe1;tica das c&#xe9;lulas pelo pr&#xf3;prio organismo &#x2014; primeiras horas, sem cheiro","children":[],"payload":{"tag":"li","lines":"88,90"}}],"payload":{"tag":"h4","lines":"86,87"}},{"content":"Conservadores (preservam o corpo)","children":[{"content":"<strong>Mumifica&#xe7;&#xe3;o:</strong> desidrata&#xe7;&#xe3;o em ambiente quente e seco com ventila&#xe7;&#xe3;o &#x2014; corpo seco e enrijecido","children":[],"payload":{"tag":"li","lines":"91,92"}},{"content":"<strong>Saponifica&#xe7;&#xe3;o (adipocera):</strong> transforma&#xe7;&#xe3;o da gordura em subst&#xe2;ncia cerosa em ambiente &#xfa;mido sem ar &#x2014; corpo esbranqui&#xe7;ado e gorduroso","children":[],"payload":{"tag":"li","lines":"92,93"}},{"content":"<strong>Congelamento:</strong> conserva&#xe7;&#xe3;o em baix&#xed;ssimas temperaturas","children":[],"payload":{"tag":"li","lines":"93,94"}},{"content":"<strong>Calcifica&#xe7;&#xe3;o:</strong> dep&#xf3;sito de sais de c&#xe1;lcio &#x2014; raro","children":[],"payload":{"tag":"li","lines":"94,96"}}],"payload":{"tag":"h4","lines":"90,91"}}],"payload":{"tag":"h3","lines":"84,85"}},{"content":"2.4 Estimativa do Tempo de Morte &#x2014; Cronotanatognose [Prioridade A]","children":[{"content":"M&#xe9;todos e Par&#xe2;metros","children":[{"content":"<strong>Temperatura retal:</strong> m&#xe9;todo de Henssge &#x2014; f&#xf3;rmula matem&#xe1;tica considerando peso e temperatura ambiente","children":[],"payload":{"tag":"li","lines":"99,100"}},{"content":"<strong>Livores cadav&#xe9;ricos:</strong> fixados &#x2192; mais de 6-12h; n&#xe3;o fixados &#x2192; menos de 6h","children":[],"payload":{"tag":"li","lines":"100,101"}},{"content":"<strong>Rigor mortis:</strong> ausente ainda &#x2192; primeiras 2h OU ap&#xf3;s 48h; completo &#x2192; 6-12h","children":[],"payload":{"tag":"li","lines":"101,102"}},{"content":"<strong>Conte&#xfa;do g&#xe1;strico:</strong> digest&#xe3;o completa &#x2192; 4-6h ap&#xf3;s &#xfa;ltima refei&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"102,103"}},{"content":"<strong>Entomologia forense:</strong> estudo dos insetos &#x2014; moscas chegam em minutos; ciclo das larvas indica dias/semanas","children":[],"payload":{"tag":"li","lines":"103,105"}}],"payload":{"tag":"h4","lines":"98,99"}}],"payload":{"tag":"h3","lines":"96,97"}}],"payload":{"tag":"h2","lines":"32,33"}},{"content":"3. TRAUMATOLOGIA FORENSE [Prioridade A]","children":[{"content":"3.1 Energia Mec&#xe2;nica &#x2014; Tipos de Les&#xf5;es [Prioridade A]","children":[{"content":"Por Instrumento Contundente (energia cin&#xe9;tica direta)","children":[{"content":"Mecanismos: percuss&#xe3;o, compress&#xe3;o, tra&#xe7;&#xe3;o, tor&#xe7;&#xe3;o, explos&#xe3;o","children":[],"payload":{"tag":"li","lines":"115,116"}},{"content":"<strong>Equimose:</strong> sangramento superficial sem ruptura da pele &#x2014; &quot;roxo&quot;","children":[],"payload":{"tag":"li","lines":"116,117"}},{"content":"<strong>Escoria&#xe7;&#xe3;o:</strong> arranhado &#x2014; remove apenas o epit&#xe9;lio","children":[],"payload":{"tag":"li","lines":"117,118"}},{"content":"<strong>Lacera&#xe7;&#xe3;o:</strong> ruptura irregular dos tecidos por contundente &#x2014; bordas irregulares, pontes de tecido","children":[],"payload":{"t &quot;)","children":[],"payload":{"tag":"li","lines":"136,138"}}],"payload":{"tag":"h4","lines":"134,135"}}],"payload":{"tag":"h3","lines":"112,113"}},{"content":"3.2 Les&#xf5;es por Arma de Fogo [Prioridade A &#x2014; APOSTA M&#xc1;XIMA]","children":[{"content":"Orif&#xed;cio de Entrada (OE)","children":[{"content":"<strong>Di&#xe2;metro:</strong> geralmente menor que o proj&#xe9;til (elasticidade da pele)","children":[],"payload":{"tag":"li","lines":"141,142"}},{"content":"<strong>Bordas:</strong> regulares, contusas, com halo de contus&#xe3;o (esfrega&#xe7;o)","children":[],"payload":{"tag":"li","lines":"142,143"}},{"content":"<strong>Zona de enxugo:</strong> anel de detritos do proj&#xe9;til ao redor do orif&#xed;cio (sempre presente)","children":[],"payload":{"tag":"li","lines":"143,144"}},{"content":"<strong>Tatuagem:</strong> gr&#xe3;os de p&#xf3;lvora na pele &#x2014; <strong>N&#xc3;O lava</strong> &#x2014; s&#xf3; em tiros a curta dist&#xe2;ncia","children":[],"payload":{"tag":"li","lines":"144,145"}},{"content":"<strong>Chamuscamento:</strong> queimadura da pele pelo calor da chama &#x2014; tiro encostado ou muito pr&#xf3;ximo","children":[],"payload":{"tag":"li","lines":"145,146"}},{"content":"<strong>Sinal de Bonnet (cruzamento de Bonnet):</strong> deposi&#xe7;&#xe3;o de carbono ao redor &#x2014; tiro encostado","children":[],"payload":{"tag":"li","lines":"146,148"}}],"payload":{"tag":"h4","lines":"140,141"}},{"content":"Orif&#xed;cio de Sa&#xed;da (OS)","children":[{"content":"<strong>Di&#xe2;metro:</strong> geralmente MAIOR que o OE (proj&#xe9;til deformado + energia no tecido)","children":[],"payload":{"tag":"li","lines":"149,150"}},{"content":"<strong>Bordas:</strong> irregulares, estreladas, &quot;em flor&quot;, sem halo de contus&#xe3;o","children":[],"payload":{"tag":"li","lines":"150,151"}},{"content":"<strong>SEM tatuagem, chamuscamento ou zona de enxugo</strong> &#x2014; o proj&#xe9;til j&#xe1; passou","children":[],"payload":{"tag":"li","lines":"151,153"}}],"payload":{"tag":"h4","lines":"148,149"}},{"content":"Tabela Diferencial &#x2014; OE &#xd7; OS","children":[{"content":"<table data-lines=\"155,162\">\n<thead data-lines=\"155,156\">\n<tr data-lines=\"155,156\">\n<th>Caracter&#xed;stica</th>\n<th>Orif&#xed;cio de Entrada</th>\n<th>Orif&#xed;cio de Sa&#xed;da</th>\n</tr>\n</thead>\n<tbody data-lines=\"157,162\">\n<tr data-lines=\"157,158\">\n<td>Tamanho</td>\n<td>Menor (regra)</td>\n<td>Maior (regra)</td>\n</tr>\n<tr data-lines=\"158,159\">\n<td>Bordas</td>\n<td>Regulares</td>\n<td>Irregulares</td>\n</tr>\n<tr data-lines=\"159,160\">\n<td>Halo de contus&#xe3;o</td>\n<td>Presente</td>\n<td>Ausente</td>\n</tr>\n<tr data-lines=\"160,161\">\n<td>Tatuagem</td>\n<td>Poss&#xed;vel (curta dist.)</td>\n<td>Ausente</td>\n</tr>\n<tr data-lines=\"161,162\">\n<td>Zona de enxugo</td>\n<td>Presente</td>\n<td>Ausente</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"155,162"}}],"payload":{"tag":"h4","lines":"153,154"}},{"content":"Dist&#xe2;ncia do Disparo","children":[{"content":"<strong>Contato/encostado:</strong> chamuscamento + sinal de Bonnet + tatuagem + lacera&#xe7;&#xf5;es em estrela (gases)","children":[],"payload":{"tag":"li","lines":"167,168"}},{"content":"<strong>Curta dist&#xe2;ncia (at&#xe9; ~50cm):</strong> tatuagem vis&#xed;vel + zona de enxugo","children":[],"payload":{"tag":"li","lines":"168,169"}},{"content":"<strong>M&#xe9;dia dist&#xe2;ncia (50cm-1,5m):</strong> apenas zona de enxugo; tatuagem ausente ou apagada","children":[],"payload":{"tag":"li","lines":"169,170"}},{"content":"<strong>Longa dist&#xe2;ncia (&gt;1,5m):</strong> apenas zona de enxugo &#x2014; sem tatuagem","children":[],"payload":{"tag":"li","lines":"170,172"}}],"payload":{"tag":"h4","lines":"166,167"}}],"payload":{"tag":"h3","lines":"138,139"}},{"content":"3.3 Les&#xf5;es Vitais vs. P&#xf3;s-Morte [Prioridade A]","children":[{"content":"Sinais de Les&#xe3;o Vital (ocorreu em vida)","children":[{"content":"Rea&#xe7;&#xe3;o inflamat&#xf3;ria ao redor da les&#xe3;o","children":[],"payload":{"tag":"li","lines":"175,176"}},{"content":"Co&#xe1;gulo vermelho vivo (ante-mortem) &#xd7; co&#xe1;gulo negro-escuro (post-mortem)","children":[],"payload":{"tag":"li","lines":"176,177"}},{"content":"Embolia gordurosa (fratura em vida &#x2014; gordura no sangue)","children":[],"payload":{"tag":"li","lines":"177,178"}},{"content":"Broncoaspira&#xe7;&#xe3;o de sangue (aspira&#xe7;&#xe3;o em vida)","children":[],"payload":{"tag":"li","lines":"178,180"}}],"payload":{"tag":"h4","lines":"174,175"}}],"payload":{"tag":"h3","lines":"172,173"}}],"payload":{"tag":"h2","lines":"110,111"}},{"content":"4. ASFIXIOLOGIA FORENSE [Prioridade A]","children":[{"content":"4.1 Conceito de Asfixia [Prioridade A]","children":[{"content":"Priva&#xe7;&#xe3;o do oxig&#xea;nio ao n&#xed;vel celular &#x2014; pode ser por falta de oxig&#xea;nio no ambiente ou impedimento mec&#xe2;nico da respira&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"188,189"}},{"content":"<strong>Sinais gerais de asfixia:</strong>","children":[{"content":"Cianose (colora&#xe7;&#xe3;o azulada de l&#xe1;bios e extremidades)","children":[],"payload":{"tag":"li","lines":"190,191"}},{"content":"Pet&#xe9;quias (pequenas hemorragias) conjuntivais e pet&#xe9;quias faciais","children":[],"payload":{"tag":"li","lines":"191,192"}},{"content":"Congest&#xe3;o visceral (&#xf3;rg&#xe3;os cheios de sangue)","children":[],"payload":{"tag":"li","lines":"192,193"}},{"content":"Espuma na boca e narinas (especialmente em afogamento)","children":[],"payload":{"tag":"li","lines":"193,195"}}],"payload":{"tag":"li","lines":"189,195"}}],"payload":{"tag":"h3","lines":"187,188"}},{"content":"4.2 Tipos de Asfixia Mec&#xe2;nica [Prioridade A]","children":[{"content":"Esganadura (estrangulamento manual)","children":[{"content":"Compress&#xe3;o do pesco&#xe7;o pelas <strong>m&#xe3;os</strong>","children":[],"payload":{"tag":"li","lines":"198,199"}},{"content":"Sinais: equimoses em forma de dedos no pesco&#xe7;o, unhas deixam escoria&#xe7;&#xf5;es em crescente","children":[],"payload":{"tag":"li","lines":"199,200"}},{"content":"<strong>SEMPRE</strong> &#xe9; homic&#xed;dio &#x2014; imposs&#xed;vel realizar em si mesmo","children":[],"payload":{"tag":"li","lines":"200,202"}}],"payload":{"tag":"h4","lines":"197,198"}},{"content":"Estrangulamento por la&#xe7;o","children":[{"content":"Compress&#xe3;o do pesco&#xe7;o por <strong>objeto flex&#xed;vel</strong> (corda, cinto, fio)","children":[],"payload":{"tag":"li","lines":"203,204"}},{"content":"Sulco <strong>horizontal e completo</strong> ao redor do pesco&#xe7;o &#x2014; diferente do enforcamento","children":[],"payload":{"tag":"li","lines":"204,206"}}],"payload":{"tag":"h4","lines":"202,203"}},{"content":"Enforcamento","children":[{"content":"Compress&#xe3;o do pesco&#xe7;o pelo <strong>pr&#xf3;prio peso do corpo</strong> suspenso em la&#xe7;o","children":[],"payload":{"tag":"li","lines":"207,208"}},{"content":"Sulco <strong>obl&#xed;quo, incompleto</strong> (interrompido no n&#xf3;)","children":[],"payload":{"tag":"li","lines":"208,209"}},{"content":"Pode ser <strong>completo</strong> (p&#xe9;s sem apoio) ou <strong>incompleto</strong> (p&#xe9;s tocando o ch&#xe3;o)","children":[],"payload":{"tag":"li","lines":"209,210"}},{"content":"Pode ser suic&#xed;dio, homic&#xed;dio ou acidente (n&#xe3;o &#xe9; exclusivo do suic&#xed;dio)","children":[],"payload":{"tag":"li","lines":"210,212"}}],"payload":{"tag":"h4","lines":"206,207"}},{"content":"Sufoca&#xe7;&#xe3;o (oclus&#xe3;o dos orif&#xed;cios)","children":[{"content":"Tampamento de boca e narinas por m&#xe3;o, travesseiro, pl&#xe1;stico","children":[],"payload":{"tag":"li","lines":"217,218"}},{"content":"Sinais: pet&#xe9;quias, equimoses periorais","children":[],"payload":{"tag":"li","lines":"218,219"}},{"content":"Frequente em v&#xed;timas vulner&#xe1;veis (beb&#xea;s, idosos, pessoas inconscientes)","children":[],"payload":{"tag":"li","lines":"219,221"}}],"payload":{"tag":"h4","lines":"216,217"}},{"content":"Afogamento","children":[{"content":"Preenchimento das vias a&#xe9;reas por l&#xed;quido","children":[],"payload":{"tag":"li","lines":"222,223"}},{"content":"Sinais: espuma branca e persistente no rosto, pulm&#xf5;es pesados e encharcados, <strong>cogumelo de espuma</strong> ao redor da boca","children":[],"payload":{"tag":"li","lines":"223,224"}},{"content":"<strong>Diat&#xf4;meas:</strong> algas microsc&#xf3;picas encontradas no sangue/&#xf3;rg&#xe3;os &#x2014; confirmam afogamento em &#xe1;gua com diat&#xf4;meas","children":[],"payload":{"tag":"li","lines":"224,225"}},{"content":"Pele em &quot;luva e meia&quot; (macera&#xe7;&#xe3;o por longa exposi&#xe7;&#xe3;o &#xe0; &#xe1;gua)","children":[],"payload":{"tag":"li","lines":"225,227"}}],"payload":{"tag":"h4","lines":"221,222"}},{"content":"Soterramento e Confinamento","children":[{"content":"Soterramento: compress&#xe3;o tor&#xe1;cica pela terra &#x2014; pet&#xe9;quias intensas","children":[],"payload":{"tag":"li","lines":"228,229"}},{"content":"Confinamento: esgotamento do oxig&#xea;nio em ambiente fechado","children":[],"payload":{"tag":"li","lines":"229,231"}}],"payload":{"tag":"h4","lines":"227,228"}}],"payload":{"tag":"h3","lines":"195,196"}}],"payload":{"tag":"h2","lines":"185,186"}},{"content":"5. SEXOLOGIA FORENSE [Prioridade B]","children":[{"content":"5.1 Crimes Sexuais &#x2014; Exame Pericial [Prioridade B]","children":[{"content":"Fundamentado no Art. 158 CPP (exame de corpo de delito obrigat&#xf3;rio quando h&#xe1; vest&#xed;gios)","children":[],"payload":{"tag":"li","lines":"236,237"}},{"content":"<strong>Coleta de material biol&#xf3;gico:</strong> s&#xea;men, sangue, saliva, pelos &#x2014; at&#xe9; 72h ap&#xf3;s o crime (manuten&#xe7;&#xe3;o de evid&#xea;ncias)","children":[],"payload":{"tag":"li","lines":"237,238"}},{"content":"<strong>Kit forense de crimes sexuais:</strong> padronizado pelo Minist&#xe9;rio da Sa&#xfa;de &#x2014; coleta protocolada","children":[],"payload":{"tag":"li","lines":"238,240"}}],"payload":{"tag":"h3","lines":"235,236"}},{"content":"5.2 Exame do Conjuntor Carnal [Prioridade B]","children":[{"content":"Hymen: valor probat&#xf3;rio relativo &#x2014; pode estar &#xed;ntegro mesmo ap&#xf3;s conjun&#xe7;&#xe3;o carnal","children":[],"payload":{"tag":"li","lines":"241,242"}},{"content":"Lacera&#xe7;&#xf5;es himeanas: n&#xe3;o s&#xe3;o exclusivas de rela&#xe7;&#xe3;o sexual for&#xe7;ada","children":[],"payload":{"tag":"li","lines":"242,243"}},{"content":"Les&#xf5;es genitais e perianais: valor probat&#xf3;rio maior &#x2014; especialmente em crian&#xe7;a","children":[],"payload":{"tag":"li","lines":"243,245"}}],"payload":{"tag":"h3","lines":"240,241"}},{"content":"5.3 Gravidez e Medicina Legal [Prioridade B]","children":[{"content":"<strong>Presun&#xe7;&#xe3;o legal de viol&#xea;ncia sexual:</strong> v&#xed;tima menor de 14 anos (art. 217-A CP) &#x2014; independe de consentimento","children":[],"payload":{"tag":"li","lines":"246,247"}},{"content":"<strong>Aborto legal:</strong> gravidez resultante de estupro &#x2014; n&#xe3;o exige laudo, basta declara&#xe7;&#xe3;o da v&#xed;tima (STJ)","children":[],"payload":{"tag":"li","lines":"247,249"}}],"payload":{"tag":"h3","lines":"245,246"}}],"payload":{"tag":"h2","lines":"233,234"}},{"content":"6. TOXICOLOGIA FORENSE [Prioridade B]","children":[{"content":"6.1 Conceito e Aplica&#xe7;&#xe3;o [Prioridade B]","children":[{"content":"Estudo dos venenos, t&#xf3;xicos e drogas e seus efeitos no organismo humano","children":[],"payload":{"tag":"li","lines":"254,255"}},{"content":"<strong>Dose letal (DL50):</strong> dose capaz de matar 50% dos animais testados &#x2014; par&#xe2;metro de toxicidade","children":[],"payload":{"tag":"li","lines":"255,257"}}],"payload":{"tag":"h3","lines":"253,254"}},{"content":"6.2 Amostras para Exame Toxicol&#xf3;gico [Prioridade B]","children":[{"content":"<strong>Sangue:</strong> detecta t&#xf3;xicos recentes (horas a dias)","children":[],"payload":{"tag":"li","lines":"258,259"}},{"content":"<strong>Urina:</strong> janela de detec&#xe7;&#xe3;o maior que o sangue","children":[],"payload":{"tag":"li","lines":"259,260"}},{"content":"<strong>Cabelo:</strong> &quot;janela hist&#xf3;rica&quot; &#x2014; at&#xe9; 90 dias de uso de drogas; cresce ~1 cm/m&#xea;s","children":[],"payload":{"tag":"li","lines":"260,261"}},{"content":"<strong>Humor v&#xed;treo:</strong> resistente &#xe0; putrefa&#xe7;&#xe3;o &#x2014; &#xfa;til em cad&#xe1;veres decompostos","children":[],"payload":{"tag":"li","lines":"261,262"}},{"content":"<strong>Conte&#xfa;do g&#xe1;strico:</strong> detecta ingest&#xe3;o recente de t&#xf3;xico oral","children":[],"payload":{"tag":"li","lines":"262,264"}}],"payload":{"tag":"h3","lines":"257,258"}},{"content":"6.3 GSR &#x2014; Res&#xed;duo de Disparo de Arma de Fogo [Prioridade A]","children":[{"content":"<strong>Composi&#xe7;&#xe3;o:</strong> part&#xed;culas de chumbo (Pb), b&#xe1;rio (Ba) e antim&#xf4;nio (Sb) &#x2014; tr&#xed;ade GSR","children":[],"payload":{"tag":"li","lines":"265,266"}},{"content":"<strong>Localiza&#xe7;&#xe3;o:</strong> m&#xe3;o de quem efetuou o disparo &#x2014; dorso e espa&#xe7;o interdigital","children":[],"payload":{"tag":"li","lines":"266,267"}},{"content":"<strong>Coleta:</strong> swab &#xfa;mido &#x2014; at&#xe9; 6h ap&#xf3;s o disparo (cai com lavagem das m&#xe3;os)","children":[],"payload":{"tag":"li","lines":"267,268"}},{"content":"<strong>An&#xe1;lise:</strong> MEV-EDS (Microscopia Eletr&#xf4;nica de Varredura com Espectroscopia)","children":[],"payload":{"tag":"li","lines":"268,269"}},{"content":"Presen&#xe7;a confirma contato com res&#xed;duo de disparo &#x2014; n&#xe3;o prova autoria isoladamente","children":[],"payload":{"tag":"li","lines":"269,271"}}],"payload":{"tag":"h3","lines":"264,265"}}],"payload":{"tag":"h2","lines":"251,252"}},{"content":"7. IDENTIFICA&#xc7;&#xc3;O M&#xc9;DICO-LEGAL [Prioridade B]","children":[{"content":"7.1 M&#xe9;todos de Identifica&#xe7;&#xe3;o [Prioridade B]","children":[{"content":"<strong>Papiloscopia:</strong> impress&#xf5;es digitais, palmares, plantares &#x2014; m&#xe9;todo mais seguro de identifica&#xe7;&#xe3;o individual","children":[],"payload":{"tag":"li","lines":"279,280"}},{"content":"<strong>DNA:</strong> perfil gen&#xe9;tico &#x2014; padr&#xe3;o-ouro para identifica&#xe7;&#xe3;o; compara&#xe7;&#xe3;o com familiares","children":[],"payload":{"tag":"li","lines":"280,281"}},{"content":"<strong>Arcada dent&#xe1;ria (odontologia forense):</strong> resistente ao fogo e decomposi&#xe7;&#xe3;o &#x2014; &#xfa;til em carbonizados","children":[],"payload":{"tag":"li","lines":"281,282"}},{"content":"<strong>Radiologia forense:</strong> compara&#xe7;&#xe3;o de radiografias ante-mortem e post-mortem","children":[],"payload":{"tag":"li","lines":"282,283"}},{"content":"<strong>Antropologia forense:</strong> an&#xe1;lise de ossos &#x2014; determina sexo, idade, estatura, etnia","children":[],"payload":{"tag":"li","lines":"283,285"}}],"payload":{"tag":"h3","lines":"278,279"}},{"content":"7.2 Identidade vs. Identifica&#xe7;&#xe3;o [Prioridade B]","children":[{"content":"<strong>Identidade:</strong> conjunto de caracteres que individualizam uma pessoa","children":[],"payload":{"tag":"li","lines":"286,287"}},{"content":"<strong>Identifica&#xe7;&#xe3;o:</strong> processo de reconhecer e confirmar a identidade","children":[],"payload":{"tag":"li","lines":"287,288"}},{"content":"<strong>Identifica&#xe7;&#xe3;o judici&#xe1;ria &#x2260; identifica&#xe7;&#xe3;o criminal:</strong> judici&#xe1;ria &#xe9; mais ampla (civil + criminal)","children":[],"payload":{"tag":"li","lines":"288,290"}}],"payload":{"tag":"h3","lines":"285,286"}}],"payload":{"tag":"h2","lines":"276,277"}},{"content":"QUADRO RESUMO &#x2014; APOSTAS DO DETETIVE","children":[{"content":"<table data-lines=\"294,308\">\n<thead data-lines=\"294,295\">\n<tr data-lines=\"294,295\">\n<th>Aposta</th>\n<th>&#xc1;rea</th>\n<th>Prioridade</th>\n</tr>\n</thead>\n<tbody data-lines=\"296,308\">\n<tr data-lines=\"296,297\">\n<td>Livor mortis fixado = mais de 6-12h ap&#xf3;s a morte</td>\n<td>Tanatologia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"297,298\">\n<td>Rigor mortis: sequ&#xea;ncia c&#xe9;falo-caudal; completo em 6-12h</td>\n<td>Tanatologia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"298,299\">\n<td>OE &#xd7; OS: entrada = regular + enxugo; sa&#xed;da = irregular</td>\n<td>Traumatologia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"299,300\">\n<td>Tatuagem = gr&#xe3;os de p&#xf3;lvora, N&#xc3;O lava, s&#xf3; curta dist&#xe2;ncia</td>\n<td>Traumatologia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"300,301\">\n<td>Esganadura = SEMPRE homic&#xed;dio (imposs&#xed;vel autoprovocada)</td>\n<td>Asfixiologia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"301,302\">\n<td>Enforcamento = sulco obl&#xed;quo incompleto; estrangulamento = horizontal completo</td>\n<td>Asfixiologia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"302,303\">\n<td>GSR: Pb + Ba + Sb; swab; at&#xe9; 6h; MEV-EDS</td>\n<td>Toxicologia</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"303,304\">\n<td>Putrefa&#xe7;&#xe3;o: fossa il&#xed;aca DIREITA (primeira mancha verde)</td>\n<td>Tanatologia</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"304,305\">\n<td>Mumifica&#xe7;&#xe3;o = seco; saponifica&#xe7;&#xe3;o = &#xfa;mido sem ar</td>\n<td>Tanatologia</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"305,306\">\n<td>Diat&#xf4;meas em &#xf3;rg&#xe3;os confirmam afogamento</td>\n<td>Asfixiologia</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"306,307\">\n<td>Cabelo = janela hist&#xf3;rica de 90 dias para drogas</td>\n<td>Toxicologia</td>\n<td>M&#xc9;DIA</td>\n</tr>\n<tr data-lines=\"307,308\">\n<td>Faca de dois gumes = orif&#xed;cio &quot;olho de peixe&quot;</td>\n<td>Traumatologia</td>\n<td>M&#xc9;DIA</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag"
