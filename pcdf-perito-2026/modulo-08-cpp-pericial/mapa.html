o","children":[],"payload":{"tag":"li","lines":"116,117"}},{"content":"<strong>Quem pode formular:</strong> Minist&#xe9;rio P&#xfa;blico, assistente de acusa&#xe7;&#xe3;o, ofendido, querelante, acusado e seu defensor","children":[],"payload":{"tag":"li","lines":"117,118"}},{"content":"<strong>Momento:</strong> antes do in&#xed;cio dos trabalhos periciais (quesitos complementares: durante os trabalhos)","children":[],"payload":{"tag":"li","lines":"118,120"}}],"payload":{"tag":"h3","lines":"115,116"}},{"content":"5.2 Obriga&#xe7;&#xe3;o de Responder [Prioridade A]","children":[{"content":"O perito &#xe9; obrigado a responder aos quesitos formulados pelas partes &#x2014; n&#xe3;o pode recusar sem justificativa t&#xe9;cnica","children":[],"payload":{"tag":"li","lines":"121,122"}},{"content":"Se o quesito for impertinente, a autoridade pode indeferir","children":[],"payload":{"tag":"li","lines":"122,124"}}],"payload":{"tag":"h3","lines":"120,121"}},{"content":"5.3 Quesitos Suplementares [Prioridade B]","children":[{"content":"Partes podem formular quesitos suplementares durante o andamento da per&#xed;cia","children":[],"payload":{"tag":"li","lines":"125,126"}},{"content":"O juiz pode formular quesitos de of&#xed;cio &#x2014; Art. 176 par&#xe1;grafo &#xfa;nico","children":[],"payload":{"tag":"li","lines":"126,128"}}],"payload":{"tag":"h3","lines":"124,125"}}],"payload":{"tag":"h2","lines":"113,114"}},{"content":"6. O LAUDO PERICIAL NO CPP [Prioridade A]","children":[{"content":"6.1 Prazo &#x2014; Art. 160 CPP [Prioridade A &#x2014; APOSTA ALTA]","children":[{"content":"<strong>Prazo:</strong> 10 dias para entrega do laudo","children":[],"payload":{"tag":"li","lines":"133,134"}},{"content":"<strong>Fixado por:</strong> autoridade requisitante (delegado, juiz, MP)","children":[],"payload":{"tag":"li","lines":"134,135"}},{"content":"<strong>Prorrog&#xe1;vel:</strong> mediante justificativa t&#xe9;cnica e autoriza&#xe7;&#xe3;o da autoridade","children":[],"payload":{"tag":"li","lines":"135,136"}},{"content":"Contagem: a partir do recebimento do material ou da intima&#xe7;&#xe3;o do perito","children":[],"payload":{"tag":"li","lines":"136,138"}}],"payload":{"tag":"h3","lines":"132,133"}},{"content":"6.2 Estrutura do Laudo [Prioridade A]","children":[{"content":"<strong>Pre&#xe2;mbulo:</strong> qualifica&#xe7;&#xe3;o dos peritos, origem do material, refer&#xea;ncia &#xe0; requisi&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"142,143"}},{"content":"<strong>Hist&#xf3;rico:</strong> fatos que motivaram a per&#xed;cia","children":[],"payload":{"tag":"li","lines":"143,144"}},{"content":"<strong>Objeto do exame:</strong> descri&#xe7;&#xe3;o minuciosa do material recebido","children":[],"payload":{"tag":"li","lines":"144,145"}},{"content":"<strong>Metodologia:</strong> m&#xe9;todo cient&#xed;fico empregado, normas t&#xe9;cnicas aplicadas","children":[],"payload":{"tag":"li","lines":"145,146"}},{"content":"<strong>Resultado:</strong> achados t&#xe9;cnicos observados","children":[],"payload":{"tag":"li","lines":"146,147"}},{"content":"<strong>Conclus&#xe3;o:</strong> resposta objetiva a cada quesito formulado","children":[],"payload":{"tag":"li","lines":"147,149"}}],"payload":{"tag":"h3","lines":"141,142"}},{"content":"6.3 Tipos de Laudo [Prioridade B]","children":[{"content":"<table data-lines=\"151,156\">\n<thead data-lines=\"151,152\">\n<tr data-lines=\"151,152\">\n<th>Tipo</th>\n<th>Quando se usa</th>\n</tr>\n</thead>\n<tbody data-lines=\"153,156\">\n<tr data-lines=\"153,154\">\n<td><strong>Definitivo</strong></td>\n<td>Exame completo &#x2014; regra</td>\n</tr>\n<tr data-lines=\"154,155\">\n<td><strong>Provis&#xf3;rio</strong></td>\n<td>Emitido antes de todos os exames serem conclu&#xed;dos (ex.: laudo de local enquanto amostras ainda s&#xe3;o analisadas)</td>\n</tr>\n<tr data-lines=\"155,156\">\n<td><strong>Complementar</strong></td>\n<td>Quando o laudo original for omisso, obscuro ou insuficiente &#x2014; Art. 181 CPP</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"151,156"}}],"payload":{"tag":"h3","lines":"149,150"}},{"content":"6.4 O Juiz e o Laudo &#x2014; Art. 182 CPP [Prioridade A]","children":[{"content":"<strong>&quot;O juiz n&#xe3;o est&#xe1; adstrito ao laudo&quot;</strong> &#x2014; pode discordar das conclus&#xf5;es","children":[],"payload":{"tag":"li","lines":"158,159"}},{"content":"PODE: desconsiderar o laudo e pedir novo exame; fundamentar sua decis&#xe3;o em outros elementos de prova","children":[],"payload":{"tag":"li","lines":"159,160"}},{"content":"<strong>N&#xc3;O PODE:</strong> alterar as conclus&#xf5;es t&#xe9;cnicas do laudo; substituir a opini&#xe3;o t&#xe9;cnica do perito","children":[],"payload":{"tag":"li","lines":"160,162"}}],"payload":{"tag":"h3","lines":"157,158"}}],"payload":{"tag":"h2","lines":"130,131"}},{"content":"7. LAUDO COMPLEMENTAR DE LES&#xc3;O CORPORAL &#x2014; ART. 168 CPP [Prioridade A]","children":[{"content":"7.1 Exame Complementar de Les&#xe3;o Corporal [Prioridade A]","children":[{"content":"Quando a natureza da les&#xe3;o corporal n&#xe3;o puder ser determinada no primeiro exame (les&#xe3;o que precisa de evolu&#xe7;&#xe3;o para se qualificar)","children":[],"payload":{"tag":"li","lines":"170,171"}},{"content":"<strong>Prazo base:</strong> o primeiro exame &#xe9; feito logo ap&#xf3;s o fato; o complementar &#xe9; feito ao t&#xe9;rmino do prazo de 30 dias","children":[],"payload":{"tag":"li","lines":"171,173"}}],"payload":{"tag":"h3","lines":"169,170"}},{"content":"7.2 Qualifica&#xe7;&#xe3;o da Les&#xe3;o [Prioridade A &#x2014; APOSTA ALTA]","children":[{"content":"<table data-lines=\"175,180\">\n<thead data-lines=\"175,176\">\n<tr data-lines=\"175,176\">\n<th>Tipo de Les&#xe3;o</th>\n<th>Caracter&#xed;stica</th>\n<th>Prazo</th>\n</tr>\n</thead>\n<tbody data-lines=\"177,180\">\n<tr data-lines=\"177,178\">\n<td><strong>Leve</strong></td>\n<td>Sem qualificadoras</td>\n<td>Exame &#xfa;nico</td>\n</tr>\n<tr data-lin
