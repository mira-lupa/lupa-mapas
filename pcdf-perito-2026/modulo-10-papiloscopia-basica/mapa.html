aneamente; queimaduras ou ferimentos superficiais: o padr&#xe3;o se regenera igual; destrui&#xe7;&#xe3;o profunda (derme): impossibilita a coleta, mas n&#xe3;o muda o padr&#xe3;o se regenerado","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"<strong>Variabilidade (individualidade):</strong> cada pessoa tem um conjunto &#xfa;nico de impress&#xf5;es digitais &#x2014; duas pessoas n&#xe3;o t&#xea;m o mesmo padr&#xe3;o, nem mesmo g&#xea;meos id&#xea;nticos (DNA igual, impress&#xf5;es diferentes)","children":[],"payload":{"tag":"li","lines":"26,27"}},{"content":"<strong>Classificabilidade:</strong> os desenhos podem ser classificados em grupos e tipos, permitindo organiza&#xe7;&#xe3;o em sistemas de busca (AFIS)","children":[],"payload":{"tag":"li","lines":"27,29"}}],"payload":{"tag":"h4","lines":"23,24"}}],"payload":{"tag":"h3","lines":"21,22"}}],"payload":{"tag":"h2","lines":"8,9"}},{"content":"2. ANATOMIA DOS SULCOS PAPILARES [Prioridade B]","children":[{"content":"2.1 Forma&#xe7;&#xe3;o dos Sulcos [Prioridade B]","children":[{"content":"Formados entre o 3&#xb0; e 5&#xb0; m&#xea;s de vida intrauterina","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"Determinados geneticamente + fatores uterinos aleat&#xf3;rios &#x2192; individualidade","children":[],"payload":{"tag":"li","lines":"38,39"}},{"content":"Localiza&#xe7;&#xe3;o: polpas dos dedos, palmas das m&#xe3;os, plantas dos p&#xe9;s","children":[],"payload":{"tag":"li","lines":"39,40"}},{"content":"Estrutura: cristas (elevadas) + sulcos (deprimidos) entre elas","children":[],"payload":{"tag":"li","lines":"40,42"}}],"payload":{"tag":"h3","lines":"36,37"}},{"content":"2.2 Poros e Canal&#xed;culos [Prioridade B]","children":[{"content":"Cada crista papilar cont&#xe9;m gl&#xe2;ndulas sudor&#xed;paras que secretam suor pelos poros","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"O suor (&#xe1;gua + gordura + prote&#xed;nas) deixado no contato forma a impress&#xe3;o latente","children":[],"payload":{"tag":"li","lines":"44,45"}},{"content":"<strong>Porascopia:</strong> estudo dos poros das cristas papilares &#x2014; usado para identifica&#xe7;&#xe3;o quando o fragmento de impress&#xe3;o &#xe9; muito pequeno para o m&#xe9;todo convencional","children":[],"payload":{"tag":"li","lines":"45,47"}}],"payload":{"tag":"h3","lines":"42,43"}}],"payload":{"tag":"h2","lines":"34,35"}},{"content":"3. CLASSIFICA&#xc7;&#xc3;O DAS IMPRESS&#xd5;ES DIGITAIS [Prioridade A]","children":[{"content":"3.1 Quanto &#xe0; Visibilidade [Prioridade A]","children":[{"content":"Impress&#xe3;o Latente","children":[{"content":"Invis&#xed;vel a olho nu &#x2014; formada pelo suor deixado no contato","children":[],"payload":{"tag":"li","lines":"54,55"}},{"content":"Precisa de t&#xe9;cnica de revela&#xe7;&#xe3;o para ser visualizada","children":[],"payload":{"tag":"li","lines":"55,56"}},{"content":"Mais comum nos locais de crime &#x2014; exige trabalho do perito para revelar","children":[],"payload":{"tag":"li","lines":"56,58"}}],"payload":{"tag":"h4","lines":"53,54"}},{"content":"Impress&#xe3;o Patente (vis&#xed;vel)","children":[{"content":"Vis&#xed;vel a olho nu &#x2014; formada por subst&#xe2;ncia pigmentante (sangue, tinta, fuligem, gordura)","children":[],"payload":{"tag":"li","lines":"59,60"}},{"content":"Pode ser registrada diretamente por fotografia","children":[],"payload":{"tag":"li","lines":"60,62"}}],"payload":{"tag":"h4","lines":"58,59"}},{"content":"Impress&#xe3;o Pl&#xe1;stica (moldada)","children":[{"content":"Impressa em material male&#xe1;vel (massa de modelar, cera, argila, manteiga, chocolate)","children":[],"payload":{"tag":"li","lines":"63,64"}},{"content":"Tridimensional &#x2014; revela o relevo do sulco","children":[],"payload":{"tag":"li","lines":"64,66"}}],"payload":{"tag":"h4","lines":"62,63"}}],"payload":{"tag":"h3","lines":"51,52"}},{"content":"3.2 Classifica&#xe7;&#xe3;o de Vucetich &#x2014; Tipos Fundamentais [Prioridade A &#x2014; APOSTA M&#xc1;XIMA]","children":[{"content":"O Sistema Vucetich","children":[{"content":"Criado por <strong>Juan Vucetich</strong> (argentino) &#x2014; 1891 &#x2014; base do sistema brasileiro","children":[],"payload":{"tag":"li","lines":"72,73"}},{"content":"Classifica as impress&#xf5;es do polegar em <strong>4 tipos</strong> (letras para o polegar)","children":[],"payload":{"tag":"li","lines":"73,74"}},{"content":"Para os demais dedos: <strong>n&#xfa;meros</strong> (1, 2, 3, 4)","children":[],"payload":{"tag":"li","lines":"74,76"}}],"payload":{"tag":"h4","lines":"71,72"}},{"content":"Os 4 Tipos Fundamentais","children":[{"content":"<table data-lines=\"78,84\">\n<thead data-lines=\"78,79\">\n<tr data-lines=\"78,79\">\n<th>Tipo</th>\n<th>Polegar</th>\n<th>Demais dedos</th>\n<th>Deltas</th>\n<th>Caracter&#xed;sticas</th>\n</tr>\n</thead>\n<tbody data-lines=\"80,84\">\n<tr data-lines=\"80,81\">\n<td><strong>Arco</strong></td>\n<td>A</td>\n<td>1</td>\n<td>Nenhum delta</td>\n<td>Linhas curvas sem delta nem n&#xfa;cleo &#x2014; mais simples</td>\n</tr>\n<tr data-lines=\"81,82\">\n<td><strong>Presilha interna</strong></td>\n<td>I</td>\n<td>2</td>\n<td>1 delta &#xe0; direita</td>\n<td>Abertura voltada para o lado interno (esquerdo)</td>\n</tr>\n<tr data-lines=\"82,83\">\n<td><strong>Presilha externa</strong></td>\n<td>E</td>\n<td>3</td>\n<td>1 delta &#xe0; esquerda</td>\n<td>Abertura voltada para o lado externo (direito)</td>\n</tr>\n<tr data-lines=\"83,84\">\n<td><strong>Verticilo</strong></td>\n<td>V</td>\n<td>4</td>\n<td>2 deltas</td>\n<td>Linhas circulares ou espirais com 2 deltas</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"78,84"}}],"payload":{"tag":"h4","lines":"76,77"}},{"content":"Delta &#x2014; Conceito","children":[{"content":"<strong>Delta:</strong> ponto onde tr&#xea;s grupos de linhas convergem, formando um tri&#xe2;ngulo","children":[],"payload":{"tag":"li","lines":"89,90"}},{"content":"&#xc9; o elemento central da classifica&#xe7;&#xe3;o de Vucetich","children":[],"payload":{"tag":"li","lines":"90,91"}},{"content":"Arco: sem delta | Presilhas: 1 delta | Verticilo: 2 deltas","children":[],"payload":{"tag":"li","lines":"91,93"}}],"payload":{"tag":"h4","lines":"88,89"}},{"content":"N&#xfa;cleo &#x2014; Conceito","children":[{"content":"<strong>N&#xfa;cleo:</strong> centro do desenho papilar &#x2014; ponto central da impress&#xe3;o","children":[],"payload":{"tag":"li","lines":"94,95"}},{"content":"Arco: sem n&#xfa;cleo definido | Presilhas e verticilos: t&#xea;m n&#xfa;cleo","children":[],"payload":{"tag":"li","lines":"95,97"}}],"payload":{"tag":"h4","lines":"93,94"}}],"payload":{"tag":"h3","lines":"69,70"}}],"payload":{"tag":"h2","lines":"49,50"}},{"content":"4. SISTEMAS DE CLASSIFICA&#xc7;&#xc3;O DATILOSCOPICA [Prioridade B]","children":[{"content":"4.1 Sistema Vucetich (Brasil) [Prioridade B]","children":[{"content":"Adotado oficialmente no Brasil desde 1903 (Rio de Janeiro)","children":[],"payload":{"tag":"li","lines":"102,103"}},{"content":"Base: 4 tipos fundamentais + subdivis&#xf5;es","children":[],"payload":{"tag":"li","lines":"103,104"}},{"content":"F&#xf3;rmula datilosc&#xf3;pica: combina&#xe7;&#xe3;o de letras (polegar) e n&#xfa;meros (demais dedos)","children":[],"payload":{"tag":"li","lines":"104,106"}}],"payload":{"tag":"h3","lines":"101,102"}},{"content":"4.2 Sistema Henry (Reino Unido / EUA) [Prioridade C]","children":[{"content":"Criado por Edward Henry &#x2014; sistema alfanum&#xe9;rico mais complexo","children":[],"payload":{"tag":"li","lines":"107,108"}},{"content":"Usado no Reino Unido e EUA historicamente","children":[],"payload":{"tag":"li","lines":"108,109"}},{"content":"N&#xe3;o adotado no Brasil","children":[],"payload":{"tag":"li","lines":"109,111"}}],"payload":{"tag":"h3","lines":"106,107"}},{"content":"4.3 AFIS &#x2014; Sistema Automatizado de Identifica&#xe7;&#xe3;o [Prioridade A]","children":[{"content":"<strong>AFIS:</strong> Automated Fingerprint Identification System","children":[],"payload":{"tag":"li","lines":"112,113"}},{"content":"Banco de dados digital de impress&#xf5;es digitais com busca automatizada","children":[],"payload":{"tag":"li","lines":"113,114"}},{"content":"No Brasil: gerenciado pela Pol&#xed;cia Federal e pelos institutos estaduais","children":[],"payload":{"tag":"li","lines":"114,115"}},{"content":"Permite busca por fragmentos de impress&#xf5;es coletados em locais de crime","children":[],"payload":{"tag":"li","lines":"115,116"}},{"content":"Min&#xfa;cias: pontos caracter&#xed;sticos usados pelo AFIS para compara&#xe7;&#xe3;o (bifurca&#xe7;&#xe3;o, termina&#xe7;&#xe3;o, enclave, ponto, lago, cruzamento)","children":[],"payload":{"tag":"li","lines":"116,118"}}],"payload":{"tag":"h3","lines":"111,112"}}],"payload":{"tag":"h2","lines":"99,100"}},{"content":"5. REVELA&#xc7;&#xc3;O DE IMPRESS&#xd5;ES LATENTES [Prioridade A]","children":[{"content":"5.1 T&#xe9;cnicas por Tipo de Superf&#xed;cie [Prioridade A]","children":[{"content":"Superf&#xed;cies N&#xe3;o Porosas (vidro, metal, pl&#xe1;stico, cer&#xe2;mica)","children":[{"content":"<strong>P&#xf3; para impress&#xf5;es (p&#xf3; revelador):</strong> t&#xe9;cnica mais comum no local de crime","children":[{"content":"<strong>P&#xf3; preto</strong> (grafite + negro de fumo): sobre superf&#xed;cies claras","children":[],"payload":{"tag":"li","lines":"126,127"}},{"content":"<strong>P&#xf3; branco</strong> (&#xf3;xido de tit&#xe2;nio, alum&#xed;nio): sobre superf&#xed;cies escuras","children":[],"payload":{"tag":"li","lines":"127,128"}},{"content":"Aplica&#xe7;&#xe3;o com pincel e coleta com fita adesiva (&quot;lifting&quot;)","children":[],"payload":{"tag":"li","lines":"128,129"}}],"payload":{"tag":"li","lines":"125,129"}},{"content":"<strong>Cianoacrilato (Super Bonder) &#x2014; fuma&#xe7;a:</strong> vapores de cianoacrilato reagem com amino&#xe1;cidos do suor e depositam pol&#xed;mero branco sobre os sulcos &#x2014; ideal para locais de crime e objetos","children":[],"payload":{"tag":"li","lines":"129,131"}}],"payload":{"tag":"h4","lines":"124,125"}},{"content":"Superf&#xed;cies Porosas (papel, papel&#xe3;o, madeira, couro n&#xe3;o tratado)","children":[{"content":"<strong>Ninhidrina:</strong> reage com amino&#xe1;cidos &#x2014; produz manchas roxo-viol&#xe1;ceas (rea&#xe7;&#xe3;o de Ruhemann)","children":[],"payload":{"tag":"li","lines":"132,133"}},{"content":"<strong>DFO (1,8-Diazafluoren-9-one):</strong> fluoresc&#xea;ncia &#x2014; detecta impress&#xf5;es antigas em papel","children":[],"payload":{"tag":"li","lines":"133,134"}},{"content":"<strong>Nitrato de prata:</strong> reage com cloretos do suor &#x2014; produz manchas cinza-escuras (exposi&#xe7;&#xe3;o &#xe0; luz)","children":[],"payload":{"tag":"li","lines":"134,136"}}],"payload":{"tag":"h4","lines":"131,132"}},{"content":"Superf&#xed;cies Molhadas ou com Sangue","children":[{"content":"<strong>Amido Black:</strong> cora prote&#xed;nas do sangue &#x2014; impress&#xf5;es em sangue sobre qualquer superf&#xed;cie","children":[],"payload":{"tag":"li","lines":"137,138"}},{"content":"<strong>Violeta de cristal:</strong> sobre superf&#xed;cies molhadas","children":[],"payload":{"tag":"li","lines":"138,140"}}],"payload":{"tag":"h4","lines":"136,137"}},{"content":"Impress&#xf5;es em Pele Humana","children":[{"content":"<strong>Luminol / Luz forense (UV / laser):</strong> fluoresc&#xea;ncia &#x2014; muito sens&#xed;vel, mas n&#xe3;o espec&#xed;fico","children":[],"payload":{"tag":"li","lines":"141,142"}},{"content":"Extremamente dif&#xed;cil &#x2014; pela transpira&#xe7;&#xe3;o da pr&#xf3;pria v&#xed;tima e decomposi&#xe7;&#xe3;o r&#xe1;pida","children":[],"payload":{"tag":"li","lines":"142,144"}}],"payload":{"tag":"h4","lines":"140,141"}}],"payload":{"tag":"h3","lines":"122,123"}},{"content":"5.2 Coleta e Preserva&#xe7;&#xe3;o [Prioridade A]","children":[{"content":"<strong>Fotografia:</strong> registrar a impress&#xe3;o revelada antes de qualquer coleta &#x2014; sempre","children":[],"payload":{"tag":"li","lines":"148,149"}},{"content":"<strong>Lifting (fita adesiva):</strong> transfer&#xea;ncia da impress&#xe3;o revelada a p&#xf3; para suporte transparente","children":[],"payload":{"tag":"li","lines":"149,150"}},{"content":"<strong>Moldagem:</strong> impress&#xf5;es pl&#xe1;sticas &#x2192; molde de silicone ou gesso","children":[],"payload":{"tag":"li","lines":"150,151"}},{"content":"<strong>Swab:</strong> impress&#xf5;es em suporte n&#xe3;o transfer&#xed;vel &#x2014; swab &#xfa;mido para an&#xe1;lise de DNA residual","children":[],"payload":{"tag":"li","lines":"151,153"}}],"payload":{"tag":"h3","lines":"147,148"}}],"payload":{"tag":"h2","lines":"120,121"}},{"content":"6. AN&#xc1;LISE E COTEJO [Prioridade A]","children":[{"content":"6.1 Min&#xfa;cias &#x2014; Pontos Caracter&#xed;sticos [Prioridade A]","children":[{"content":"<strong>Min&#xfa;cias:</strong> detalhes dos sulcos papilares usados para compara&#xe7;&#xe3;o individual","children":[],"payload":{"tag":"li","lines":"158,159"}},{"content":"Tipos principais de min&#xfa;cias:","children":[{"content":"<strong>Bifurca&#xe7;&#xe3;o:</strong> sulco que se divide em dois","children":[],"payload":{"tag":"li","lines":"160,161"}},{"content":"<strong>Termina&#xe7;&#xe3;o:</strong> sulco que termina abruptamente","children":[],"payload":{"tag":"li","lines":"161,162"}},{"content":"<strong>Enclave (ilha):</strong> sulco curto entre dois sulcos","children":[],"payload":{"tag":"li","lines":"162,163"}},{"content":"<strong>Ponto:</strong> sulco muito curto, quase circular","children":[],"payload":{"tag":"li","lines":"163,164"}},{"content":"<strong>Lago (delta):</strong> sulco que encircla e volta","children":[],"payload":{"tag":"li","lines":"164,165"}},{"content":"<strong>Cruzamento:</strong> dois sulcos que se cruzam","children":[],"payload":{"tag":"li","lines":"165,166"}}],"payload":{"tag":"li","lines":"159,166"}},{"content":"<strong>N&#xfa;mero m&#xed;nimo de min&#xfa;cias para identifica&#xe7;&#xe3;o:</strong> n&#xe3;o h&#xe1; n&#xfa;mero fixo na lei brasileira; a per&#xed;cia &#xe9; hol&#xed;stica; internacionalmente usa-se refer&#xea;ncia de 12 a 16 min&#xfa;cias","children":[],"payload":{"tag":"li","lines":"166,168"}}],"payload":{"tag":"h3","lines":"157,158"}},{"content":"6.2 M&#xe9;todo ACE-V [Prioridade A]","children":[{"content":"<strong>ACE-V:</strong> An&#xe1;lise &#x2192; Compara&#xe7;&#xe3;o &#x2192; Avalia&#xe7;&#xe3;o &#x2192; Verifica&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"172,173"}},{"content":"Padr&#xe3;o internacional para an&#xe1;lise de impress&#xf5;es digitais em per&#xed;cia","children":[],"payload":{"tag":"li","lines":"173,174"}},{"content":"<strong>An&#xe1;lise:</strong> examinar a impress&#xe3;o problema (latente) isoladamente &#x2014; qualidade, quantidade de min&#xfa;cias","children":[],"payload":{"tag":"li","lines":"174,175"}},{"content":"<strong>Compara&#xe7;&#xe3;o:</strong> colocar lado a lado com a impress&#xe3;o de refer&#xea;ncia (do suspeito ou do banco de dados)","children":[],"payload":{"tag":"li","lines":"175,176"}},{"content":"<strong>Avalia&#xe7;&#xe3;o:</strong> conclus&#xe3;o &#x2014; identifica&#xe7;&#xe3;o (ID), exclus&#xe3;o (exclu&#xed;do) ou inconclusivo","children":[],"payload":{"tag":"li","lines":"176,177"}},{"content":"<strong>Verifica&#xe7;&#xe3;o:</strong> revis&#xe3;o independente por segundo papiloscopista/perito","children":[],"payload":{"tag":"li","lines":"177,179"}}],"payload":{"tag":"h3","lines":"171,172"}},{"content":"6.3 Conclus&#xf5;es Poss&#xed;veis do Cotejo [Prioridade A]","children":[{"content":"<strong>Identifica&#xe7;&#xe3;o (positiva):</strong> impress&#xf5;es coincidem &#x2014; mesma pessoa","children":[],"payload":{"tag":"li","lines":"180,181"}},{"content":"<strong>Exclus&#xe3;o:</strong> impress&#xf5;es n&#xe3;o coincidem &#x2014; pessoas diferentes","children":[],"payload":{"tag":"li","lines":"181,182"}},{"content":"<strong>Inconclusivo:</strong> qualidade ou quantidade insuficiente de min&#xfa;cias para concluir","children":[],"payload":{"tag":"li","lines":"182,184"}}],"payload":{"tag":"h3","lines":"179,180"}}],"payload":{"tag":"h2","lines":"155,156"}},{"content":"7. IDENTIFICA&#xc7;&#xc3;O HUMANA [Prioridade A]","children":[{"content":"7.1 M&#xe9;todos de Identifica&#xe7;&#xe3;o Criminal [Prioridade A]","children":[{"content":"<table data-lines=\"190,198\">\n<thead data-lines=\"190,191\">\n<tr data-lines=\"190,191\">\n<th>M&#xe9;todo</th>\n<th>Tipo</th>\n<th>Confiabilidade</th>\n<th>Observa&#xe7;&#xe3;o</th>\n</tr>\n</thead>\n<tbody data-lines=\"192,198\">\n<tr data-lines=\"192,193\">\n<td><strong>Papiloscopia</strong></td>\n<td>Biom&#xe9;trico</td>\n<td>M&#xe1;xima</td>\n<td>Imut&#xe1;vel, perene, classific&#xe1;vel</td>\n</tr>\n<tr data-lines=\"193,194\">\n<td><strong>DNA</strong></td>\n<td>Gen&#xe9;tico</td>\n<td>M&#xe1;xima</td>\n<td>Padr&#xe3;o-ouro; exige material biol&#xf3;gico</td>\n</tr>\n<tr data-lines=\"194,195\">\n<td><strong>Reconhecimento facial</strong></td>\n<td>Biom&#xe9;trico</td>\n<td>Alta</td>\n<td>Varia com envelhecimento</td>\n</tr>\n<tr data-lines=\"195,196\">\n<td><strong>Odontologia</strong></td>\n<td>Morfol&#xf3;gico</td>\n<td>Alta</td>\n<td>Resiste ao fogo e decomposi&#xe7;&#xe3;o</td>\n</tr>\n<tr data-lines=\"196,197\">\n<td><strong>Radiologia</strong></td>\n<td>Morfol&#xf3;gico</td>\n<td>Alta</td>\n<td>Compara&#xe7;&#xe3;o de ossos</td>\n</tr>\n<tr data-lines=\"197,198\">\n<td><strong>Bertillonagem</strong></td>\n<td>Antropom&#xe9;trico</td>\n<td>Baixa</td>\n<td>Sistema antigo (superado pela papiloscopia)</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"190,198"}}],"payload":{"tag":"h3","lines":"188,189"}},{"content":"7.2 Identifica&#xe7;&#xe3;o Civil vs. Criminal [Prioridade B]","children":[{"content":"<strong>Identifica&#xe7;&#xe3;o civil:</strong> RG &#x2014; sistema decadatilar (10 dedos) &#x2014; banco de dados AFIS estadual","children":[],"payload":{"tag":"li","lines":"200,201"}},{"content":"<strong>Identifica&#xe7;&#xe3;o criminal:</strong> art. 5&#xb0; LVIII CF &#x2014; &quot;o civilmente identificado n&#xe3;o ser&#xe1; submetido &#xe0; identifica&#xe7;&#xe3;o criminal, salvo nas hip&#xf3;teses previstas em lei&quot; (Lei 12.037/2009)","children":[],"payload":{"tag":"li","lines":"201,202"}},{"content":"<strong>Hip&#xf3;teses legais de identifica&#xe7;&#xe3;o criminal do civilmente identificado:</strong>","children":[{"content":"Documento claramente falso ou falsificado","children":[],"payload":{"tag":"li","lines":"203,204"}},{"content":"Documento insuficiente para identifica&#xe7;&#xe3;o (ileg&#xed;vel, danificado)","children":[],"payload":{"tag":"li","lines":"204,205"}},{"content":"Aus&#xea;ncia de identifica&#xe7;&#xe3;o civil","children":[],"payload":{"tag":"li","lines":"205,206"}},{"content":"Crime praticado que deixe vest&#xed;gio (Lei 12.654/2012: coleta de DNA para crimes graves)","children":[],"payload":{"tag":"li","lines":"206,208"}}],"payload":{"tag":"li","lines":"202,208"}}],"payload":{"tag":"h3","lines":"199,200"}},{"content":"7.3 BNAFIM &#x2014; Banco Nacional de Perfis de DNA [Prioridade B]","children":[{"content":"Criado pela Lei 12.654/2012","children":[],"payload":{"tag":"li","lines":"209,210"}},{"content":"Integra perfis de DNA de condenados por crimes graves e de vest&#xed;gios de locais de crime","children":[],"payload":{"tag":"li","lines":"210,211"}},{"content":"Gerenciado pela Pol&#xed;cia Federal com participa&#xe7;&#xe3;o dos institutos estaduais","children":[],"payload":{"tag":"li","lines":"211,212"}},{"content":"Complementa o AFIS de impress&#xf5;es digitais","children":[],"payload":{"tag":"li","lines":"212,214"}}],"payload":{"tag":"h3","lines":"208,209"}}],"payload":{"tag":"h2","lines":"186,187"}},{"content":"8. PAPILOSCOPIA NO LOCAL DE CRIME [Prioridade A]","children":[{"content":"8.1 Sequ&#xea;ncia de Trabalho no Local [Prioridade A]","children":[{"content":"1. <strong>Documenta&#xe7;&#xe3;o fotogr&#xe1;fica</strong> do local antes de qualquer interven&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"219,220","listIndex":1}},{"content":"2. <strong>Identifica&#xe7;&#xe3;o visual</strong> das superf&#xed;cies com potencial de impress&#xe3;o","children":[],"payload":{"tag":"li","lines":"220,221","listIndex":2}},{"content":"3. <strong>Aplica&#xe7;&#xe3;o de t&#xe9;cnica</strong> adequada &#xe0; superf&#xed;cie (p&#xf3;, cianoacrilato, ninhidrina)","children":[],"payload":{"tag":"li","lines":"221,222","listIndex":3}},{"content":"4. <strong>Fotografia</strong> da impress&#xe3;o revelada (escala, n&#xfa;mero de vest&#xed;gio)","children":[],"payload":{"tag":"li","lines":"222,223","listIndex":4}},{"content":"5. <strong>Coleta</strong> por lifting (fita) ou outro m&#xe9;todo","children":[],"payload":{"tag":"li","lines":"223,224","listIndex":5}},{"content":"6. <strong>Embalagem e etiquetagem</strong> &#x2014; in&#xed;cio da cadeia de cust&#xf3;dia","children":[],"payload":{"tag":"li","lines":"224,225","listIndex":6}},{"content":"7. <strong>Transporte</strong> ao laborat&#xf3;rio","children":[],"payload":{"tag":"li","lines":"225,227","listIndex":7}}],"payload":{"tag":"h3","lines":"218,219"}},{"content":"8.2 Superf&#xed;cies de Interesse [Prioridade B]","children":[{"content":"Portas, ma&#xe7;anetas, janelas, vidros, interruptores","children":[],"payload":{"tag":"li","lines":"228,229"}},{"content":"Superf&#xed;cies lisas (mesas, balc&#xf5;es, espelhos)","children":[],"payload":{"tag":"li","lines":"229,230"}},{"content":"Embalagens, garrafas, copos, talheres","children":[],"payload":{"tag":"li","lines":"230,231"}},{"content":"Documentos, envelopes, armas, muni&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"231,233"}}],"payload":{"tag":"h3","lines":"227,228"}}],"payload":{"tag":"h2","lines":"216,217"}},{"content":"QUADRO RESUMO &#x2014; APOSTAS DO DETETIVE","children":[{"content":"<table data-lines=\"237,249\">\n<thead data-line
