5;es), Criminal&#xed;stica (local de crime), Toxicologia (GSR)","children":[],"payload":{"tag":"li","lines":"23,24"}},{"content":"O perito de bal&#xed;stica pode ser o mesmo que examina o local, a arma E as les&#xf5;es &#x2014; depende da estrutura do instituto","children":[],"payload":{"tag":"li","lines":"24,26"}}],"payload":{"tag":"h3","lines":"22,23"}}],"payload":{"tag":"h2","lines":"8,9"}},{"content":"2. ARMAS DE FOGO &#x2014; CLASSIFICA&#xc7;&#xc3;O [Prioridade A]","children":[{"content":"2.1 Quanto ao Funcionamento [Prioridade A]","children":[{"content":"Armas de Alma Lisa (cano liso)","children":[{"content":"Cano sem estrias internas","children":[],"payload":{"tag":"li","lines":"33,34"}},{"content":"Proj&#xe9;til sai sem rota&#xe7;&#xe3;o &#x2014; menor alcance e precis&#xe3;o","children":[],"payload":{"tag":"li","lines":"34,35"}},{"content":"<strong>Exemplos:</strong> espingarda, escopeta, shotgun, lupara","children":[],"payload":{"tag":"li","lines":"35,36"}},{"content":"<strong>Padr&#xe3;o de disparo:</strong> cartucho com chumbo (m&#xfa;ltiplos proj&#xe9;teis &#x2014; &quot;chumbada&quot;) ou proj&#xe9;til &#xfa;nico (slug)","children":[],"payload":{"tag":"li","lines":"36,38"}}],"payload":{"tag":"h4","lines":"32,33"}},{"content":"Armas de Alma Raiada (cano raiado)","children":[{"content":"Cano com estrias helicoidais internas &#x2014; imprimem rota&#xe7;&#xe3;o ao proj&#xe9;til","children":[],"payload":{"tag":"li","lines":"39,40"}},{"content":"Maior alcance, precis&#xe3;o e velocidade","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"<strong>Exemplos:</strong> pistola, rev&#xf3;lver, fuzil, carabina, metralhadora","children":[],"payload":{"tag":"li","lines":"41,42"}},{"content":"<strong>Estrias:</strong> sulcos internos que deixam marcas &#xfa;nicas no proj&#xe9;til &#x2014; base da identifica&#xe7;&#xe3;o bal&#xed;stica","children":[],"payload":{"tag":"li","lines":"42,44"}}],"payload":{"tag":"h4","lines":"38,39"}}],"payload":{"tag":"h3","lines":"30,31"}},{"content":"2.2 Quanto &#xe0; Quantidade de Tiros [Prioridade B]","children":[{"content":"<strong>Arma de tiro simples (monossaete):</strong> 1 tiro por vez &#x2014; espingarda de 1 cano","children":[],"payload":{"tag":"li","lines":"45,46"}},{"content":"<strong>Arma de repeti&#xe7;&#xe3;o:</strong> necessita a&#xe7;&#xe3;o manual entre disparos (ferrolho) &#x2014; espingarda de repeti&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"<strong>Arma semiautom&#xe1;tica:</strong> 1 pux&#xe3;o de gatilho = 1 tiro; mecanismo autom&#xe1;tico recarrega","children":[],"payload":{"tag":"li","lines":"47,48"}},{"content":"<strong>Arma autom&#xe1;tica:</strong> 1 pux&#xe3;o sustentado = m&#xfa;ltiplos tiros","children":[],"payload":{"tag":"li","lines":"48,50"}}],"payload":{"tag":"h3","lines":"44,45"}},{"content":"2.3 Quanto &#xe0; Portabilidade [Prioridade B]","children":[{"content":"<strong>Arma port&#xe1;til:</strong> transportada e disparada por uma pessoa (pistola, rev&#xf3;lver, fuzil)","children":[],"payload":{"tag":"li","lines":"51,52"}},{"content":"<strong>Arma n&#xe3;o port&#xe1;til:</strong> trip&#xe9; ou suporte (metralhadora pesada, canh&#xe3;o)","children":[],"payload":{"tag":"li","lines":"52,54"}}],"payload":{"tag":"h3","lines":"50,51"}}],"payload":{"tag":"h2","lines":"28,29"}},{"content":"3. MUNI&#xc7;&#xc3;O [Prioridade A]","children":[{"content":"3.1 Componentes da Muni&#xe7;&#xe3;o (Cartucho) [Prioridade A]","children":[{"content":"Os 4 componentes do cartucho de arma de fogo convencional","children":[{"content":"<table data-lines=\"62,68\">\n<thead data-lines=\"62,63\">\n<tr data-lines=\"62,63\">\n<th>Componente</th>\n<th>Fun&#xe7;&#xe3;o</th>\n<th>Localiza&#xe7;&#xe3;o</th>\n</tr>\n</thead>\n<tbody data-lines=\"64,68\">\n<tr data-lines=\"64,65\">\n<td><strong>Estojo (c&#xe1;psula)</strong></td>\n<td>Involucro que cont&#xe9;m todos os componentes &#x2014; base tem o escorvamento</td>\n<td>Base do cartucho</td>\n</tr>\n<tr data-lines=\"65,66\">\n<td><strong>Escorvamento (primer)</strong></td>\n<td>Composto sens&#xed;vel ao impacto &#x2014; deflagra a p&#xf3;lvora</td>\n<td>Fundo do estojo</td>\n</tr>\n<tr data-lines=\"66,67\">\n<td><strong>P&#xf3;lvora (propelente)</strong></td>\n<td>Combust&#xe3;o gera os gases que expelem o proj&#xe9;til</td>\n<td>Dentro do estojo</td>\n</tr>\n<tr data-lines=\"67,68\">\n<td><strong>Proj&#xe9;til (bala)</strong></td>\n<td>Elemento que sai do cano e atinge o alvo</td>\n<td>Frente do estojo</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"62,68"}}],"payload":{"tag":"h4","lines":"60,61"}}],"payload":{"tag":"h3","lines":"58,59"}},{"content":"3.2 Escorvamento &#x2014; Tipos [Prioridade B]","children":[{"content":"<strong>Escorvamento central:</strong> percussor atinge o centro do fundo do estojo &#x2014; pistolas, rev&#xf3;lveres, fuzis (maioria)","children":[],"payload":{"tag":"li","lines":"73,74"}},{"content":"<strong>Escorvamento circular (percuss&#xe3;o anel):</strong> composto distribu&#xed;do em anel na borda do fundo &#x2014; muni&#xe7;&#xe3;o .22 LR (rimfire)","children":[],"payload":{"tag":"li","lines":"74,76"}}],"payload":{"tag":"h3","lines":"72,73"}},{"content":"3.3 Calibre [Prioridade A]","children":[{"content":"<strong>Calibre:</strong> medida do di&#xe2;metro interno do cano (ou do proj&#xe9;til)","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"Pode ser expresso em polegadas (0.38, 0.45, 0.22) ou mil&#xed;metros (9mm, 7.62mm, 5.56mm)","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"<strong>Calibre nominal &#x2260; calibre real:</strong> o calibre .38 tem di&#xe2;metro real de ~9,09mm; o 9mm tem di&#xe2;metro real de ~9,01mm &#x2014; diferen&#xe7;a hist&#xf3;rica de nomenclatura","children":[],"payload":{"tag":"li","lines":"79,81"}}],"payload":{"tag":"h3","lines":"76,77"}}],"payload":{"tag":"h2","lines":"56,57"}},{"content":"4. ESTRIAS E IDENTIFICA&#xc7;&#xc3;O BAL&#xcd;STICA [Prioridade A &#x2014; APOSTA M&#xc1;XIMA]","children":[{"content":"4.1 Forma&#xe7;&#xe3;o das Estrias no Proj&#xe9;til [Prioridade A]","children":[{"content":"As estrias internas do cano (raiamento) gravam marcas <strong>&#xfa;nicas</strong> na superf&#xed;cie do proj&#xe9;til ao percorr&#xea;-lo","children":[],"payload":{"tag":"li","lines":"86,87"}},{"content":"Cada arma deixa um padr&#xe3;o de estrias diferente &#x2014; como uma &quot;impress&#xe3;o digital da arma&quot;","children":[],"payload":{"tag":"li","lines":"87,88"}},{"content":"Desgaste, corros&#xe3;o e reformas alteram as estrias ao longo do uso","children":[],"payload":{"tag":"li","lines":"88,90"}}],"payload":{"tag":"h3","lines":"85,86"}},{"content":"4.2 Compara&#xe7;&#xe3;o Bal&#xed;stica [Prioridade A]","children":[{"content":"<strong>M&#xe9;todo:</strong> disparo de proj&#xe9;til de refer&#xea;ncia com a arma suspeita em caixa de recupera&#xe7;&#xe3;o (gel bal&#xed;stico ou &#xe1;gua)","children":[],"payload":{"tag":"li","lines":"91,92"}},{"content":"Compara&#xe7;&#xe3;o microsc&#xf3;pica entre estrias do proj&#xe9;til problema (crime) e proj&#xe9;til de refer&#xea;ncia (laborat&#xf3;rio) &#x2014; <strong>microsc&#xf3;pio de compara&#xe7;&#xe3;o</strong>","children":[],"payload":{"tag":"li","lines":"92,93"}},{"content":"Conclus&#xf5;es: identifica&#xe7;&#xe3;o (mesma arma), exclus&#xe3;o (armas diferentes) ou inconclusivo","children":[],"payload":{"tag":"li","lines":"93,95"}}],"payload":{"tag":"h3","lines":"90,91"}},{"content":"4.3 Identifica&#xe7;&#xe3;o pela C&#xe1;psula (Estojo) [Prioridade A]","children":[{"content":"O percussor e a c&#xe2;mara tamb&#xe9;m deixam marcas &#xfa;nicas no fundo e lateral do estojo","children":[],"payload":{"tag":"li","lines":"96,97"}},{"content":"<strong>Marcas do percussor:</strong> no escorvamento &#x2014; forma e tamanho &#xfa;nicos","children":[],"payload":{"tag":"li","lines":"97,98"}},{"content":"<strong>Marcas da c&#xe2;mara:</strong> na lateral do estojo","children":[],"payload":{"tag":"li","lines":"98,99"}},{"content":"<strong>Marcas do extrator:</strong> na borda do estojo durante a extra&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"99,100"}},{"content":"Estojo pode ser mais f&#xe1;cil de encontrar no local de crime que o proj&#xe9;til","children":[],"payload":{"tag":"li","lines":"100,102"}}],"payload":{"tag":"h3","lines":"95,96"}}],"payload":{"tag":"h2","lines":"83,84"}},{"content":"5. LES&#xd5;ES POR ARMA DE FOGO [Prioridade A &#x2014; APOSTA M&#xc1;XIMA]","children":[{"content":"5.1 Orif&#xed;cio de Entrada (OE) [Prioridade A]","children":[{"content":"<strong>Tamanho:</strong> geralmente menor que o proj&#xe9;til (elasticidade da pele)","children":[],"payload":{"tag":"li","lines":"110,111"}},{"content":"<strong>Bordas:</strong> regulares e contusas (halo de contus&#xe3;o ao redor)","children":[],"payload":{"tag":"li","lines":"111,112"}},{"content":"<strong>Zona de enxugo:</strong> anel escuro de detritos do proj&#xe9;til (gordura, fuligem) &#x2014; SEMPRE presente no OE","children":[],"payload":{"tag":"li","lines":"112,113"}},{"content":"<strong>Tatuagem:</strong> gr&#xe3;os de p&#xf3;lvora incrustados na pele &#x2014; N&#xc3;O lava &#x2014; indica tiro a curta dist&#xe2;ncia","children":[],"payload":{"tag":"li","lines":"113,114"}},{"content":"<strong>Chamuscamento:</strong> queimadura da pele pelo calor &#x2014; tiro encostado ou &#xe0; queima-roupa","children":[],"payload":{"tag":"li","lines":"114,115"}},{"content":"<strong>Sinal de Bonnet:</strong> deposi&#xe7;&#xe3;o de fuma&#xe7;a (carbono) ao redor &#x2014; tiro encostado","children":[],"payload":{"tag":"li","lines":"115,117"}}],"payload":{"tag":"h3","lines":"109,110"}},{"content":"5.2 Orif&#xed;cio de Sa&#xed;da (OS) [Prioridade A]","children":[{"content":"<strong>Tamanho:</strong> geralmente maior que o OE (proj&#xe9;til deformado + energia cin&#xe9;tica residual)","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"<strong>Bordas:</strong> irregulares, estreladas, &quot;em flor&quot;","children":[],"payload":{"tag":"li","lines":"119,120"}},{"content":"<strong>Sem zona de enxugo, sem tatuagem, sem chamuscamento</strong> &#x2014; o proj&#xe9;til j&#xe1; saiu do cano","children":[],"payload":{"tag":"li","lines":"120,122"}}],"payload":{"tag":"h3","lines":"117,118"}},{"content":"5.3 Tabela Diferencial OE &#xd7; OS [Prioridade A]","children":[{"content":"<table data-lines=\"124,132\">\n<thead data-lines=\"124,125\">\n<tr data-lines=\"124,125\">\n<th>Caracter&#xed;stica</th>\n<th>Orif&#xed;cio de Entrada (OE)</th>\n<th>Orif&#xed;cio de Sa&#xed;da (OS)</th>\n</tr>\n</thead>\n<tbody data-lines=\"126,132\">\n<tr data-lines=\"126,127\">\n<td>Tamanho</td>\n<td>Menor (regra)</td>\n<td>Maior (regra)</td>\n</tr>\n<tr data-lines=\"127,128\">\n<td>Bordas</td>\n<td>Regulares, contusas</td>\n<td>Irregulares, estreladas</td>\n</tr>\n<tr data-lines=\"128,129\">\n<td>Halo de contus&#xe3;o</td>\n<td>Presente</td>\n<td>Ausente</td>\n</tr>\n<tr data-lines=\"129,130\">\n<td>Zona de enxugo</td>\n<td><strong>Sempre presente</strong></td>\n<td>Ausente</td>\n</tr>\n<tr data-lines=\"130,131\">\n<td>Tatuagem</td>\n<td>Poss&#xed;vel (curta dist&#xe2;ncia)</td>\n<td>Ausente</td>\n</tr>\n<tr data-lines=\"131,132\">\n<td>Chamuscamento</td>\n<td>Poss&#xed;vel (encostado)</td>\n<td>Ausente</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"124,132"}}],"payload":{"tag":"h3","lines":"122,123"}},{"content":"5.4 Dist&#xe2;ncia do Disparo [Prioridade A &#x2014; APOSTA M&#xc1;XIMA]","children":[{"content":"<table data-lines=\"135,141\">\n<thead data-lines=\"135,136\">\n<tr data-lines=\"135,136\">\n<th>Dist&#xe2;ncia</th>\n<th>Sinais no OE</th>\n</tr>\n</thead>\n<tbody data-lines=\"137,141\">\n<tr data-lines=\"137,138\">\n<td><strong>Encostado</strong></td>\n<td>Chamuscamento + sinal de Bonnet + tatuagem + lacera&#xe7;&#xf5;es estreladas por gases</td>\n</tr>\n<tr data-lines=\"138,139\">\n<td><strong>Curta (&lt;50cm)</strong></td>\n<td>Tatuagem vis&#xed;vel + zona de enxugo</td>\n</tr>\n<tr data-lines=\"139,140\">\n<td><strong>M&#xe9;dia (50cm&#x2013;1,5m)</strong></td>\n<td>Apenas zona de enxugo; tatuagem ausente</td>\n</tr>\n<tr data-lines=\"140,141\">\n<td><strong>Longa (&gt;1,5m)</strong></td>\n<td>Apenas zona de enxugo</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"135,141"}}],"payload":{"tag":"h3","lines":"133,134"}},{"content":"5.5 Ferimento At&#xed;pico por Arma de Fogo &#x2014; Tiro Encostado em Osso [Prioridade B]","children":[{"content":"Em tiro encostado com press&#xe3;o, os gases penetram junto com o proj&#xe9;til","children":[],"payload":{"tag":"li","lines":"146,147"}},{"content":"Se o tiro &#xe9; encostado na cabe&#xe7;a (cr&#xe2;nio): lacera&#xe7;&#xf5;es estreladas no escalpo por expans&#xe3;o dos gases","children":[],"payload":{"tag":"li","lines":"147,148"}},{"content":"Fratura do cr&#xe2;nio com padr&#xe3;o &quot;estampado&quot; &#x2014; base para estimativa de dist&#xe2;ncia","children":[],"payload":{"tag":"li","lines":"148,150"}}],"payload":{"tag":"h3","lines":"145,146"}}],"payload":{"tag":"h2","lines":"107,108"}},{"content":"6. TRAJET&#xd3;RIA E RECONSTITUI&#xc7;&#xc3;O [Prioridade A]","children":[{"content":"6.1 Trajet&#xf3;ria do Proj&#xe9;til [Prioridade A]","children":[{"content":"<strong>Trajet&#xf3;ria interna:</strong> dentro do corpo (da entrada at&#xe9; a sa&#xed;da ou parada)","children":[],"payload":{"tag":"li","lines":"155,156"}},{"content":"<strong>Trajet&#xf3;ria externa:</strong> do cano at&#xe9; o alvo","children":[],"payload":{"tag":"li","lines":"156,157"}},{"content":"<strong>&#xc2;ngulo de penetra&#xe7;&#xe3;o:</strong> determina a dire&#xe7;&#xe3;o do disparo &#x2014; importante na reconstitui&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"157,159"}}],"payload":{"tag":"h3","lines":"154,155"}},{"content":"6.2 Reconstitui&#xe7;&#xe3;o da Cena Bal&#xed;stica [Prioridade A]","children":[{"content":"Alinhamento do OE (entrada) e OS (sa&#xed;da) ou ponto de parada do proj&#xe9;til &#x2192; determina a linha de tiro","children":[],"payload":{"tag":"li","lines":"160,161"}},{"content":"Varetas de alinhamento inseridas no trajeto do proj&#xe9;til","children":[],"payload":{"tag":"li","lines":"161,162"}},{"content":"Auxilia a determinar: posi&#xe7;&#xe3;o do atirador, dist&#xe2;ncia, &#xe2;ngulo, posi&#xe7;&#xe3;o da v&#xed;tima no momento do disparo","children":[],"payload":{"tag":"li","lines":"162,164"}}],"payload":{"tag":"h3","lines":"159,160"}},{"content":"6.3 Marcas em Superf&#xed;cies (Impacto em Paredes e Objetos) [Prioridade B]","children":[{"content":"<strong>Ricochete:</strong> proj&#xe9;til muda de dire&#xe7;&#xe3;o ao impactar superf&#xed;cie resistente &#x2014; pode causar les&#xf5;es secund&#xe1;rias","children":[],"payload":{"tag":"li","lines":"165,166"}},{"content":"<strong>Orif&#xed;cio em vidro:</strong> forma c&#xf4;nica &#x2014; base maior no lado de sa&#xed;da &#x2192; indica sentido do disparo","children":[],"payload":{"tag":"li","lines":"166,167"}},{"content":"Proj&#xe9;til deformado pela superf&#xed;cie pode perder estrias &#x2014; identifica&#xe7;&#xe3;o imposs&#xed;vel","children":[],"payload":{"tag":"li","lines":"167,169"}}],"payload":{"tag":"h3","lines":"164,165"}}],"payload":{"tag":"h2","lines":"152,153"}},{"content":"7. GSR &#x2014; RES&#xcd;DUO DE DISPARO [Prioridade A]","children":[{"content":"7.1 Composi&#xe7;&#xe3;o e Caracter&#xed;sticas [Prioridade A]","children":[{"content":"<strong>GSR:</strong> Gunshot Residue &#x2014; part&#xed;culas liberadas pelo disparo","children":[],"payload":{"tag":"li","lines":"174,175"}},{"content":"<strong>Tr&#xed;ade GSR:</strong> Chumbo (Pb) + B&#xe1;rio (Ba) + Antim&#xf4;nio (Sb)","children":[],"payload":{"tag":"li","lines":"175,176"}},{"content":"Depositam-se no dorso e espa&#xe7;o interdigital da m&#xe3;o que segurou a arma","children":[],"payload":{"tag":"li","lines":"176,177"}},{"content":"Tamb&#xe9;m podem atingir o rosto, roupas e superf&#xed;cies pr&#xf3;ximas ao atirador","children":[],"payload":{"tag":"li","lines":"177,179"}}],"payload":{"tag":"h3","lines":"173,174"}},{"content":"7.2 Coleta e An&#xe1;lise [Prioridade A]","children":[{"content":"<strong>Coleta:</strong> swab &#xfa;mido no dorso e espa&#xe7;o interdigital &#x2014; <strong>at&#xe9; 6 horas</strong> ap&#xf3;s o disparo","children":[],"payload":{"tag":"li","lines":"180,181"}},{"content":"<strong>An&#xe1;lise:</strong> MEV-EDS (Microscopia Eletr&#xf4;nica de Varredura com Espectroscopia)","children":[],"payload":{"tag":"li","lines":"181,182"}},{"content":"<strong>Janela de coleta:</strong> cai com lavagem das m&#xe3;os, transpira&#xe7;&#xe3;o, atividade manual","children":[],"payload":{"tag":"li","lines":"182,183"}},{"content":"<strong>Interpreta&#xe7;&#xe3;o:</strong> confirma contato com res&#xed;duo de disparo &#x2014; N&#xc3;O prova autoria sozinho","children":[],"payload":{"tag":"li","lines":"183,185"}}],"payload":{"tag":"h3","lines":"179,180"}},{"content":"7.3 Limita&#xe7;&#xf5;es do GSR [Prioridade A]","children":[{"content":"V&#xed;tima tamb&#xe9;m pode ter GSR (tiro &#xe0; curta dist&#xe2;ncia)","children":[],"payload":{"tag":"li","lines":"186,187"}},{"content":"Profissionais de seguran&#xe7;a t&#xea;m GSR por contato profissional","children":[],"payload":{"tag":"li","lines":"187,188"}},{"content":"Ambiente contaminado (delegacia, viatura) pode ser fonte de contamina&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"188,189"}},{"content":"Aus&#xea;ncia de GSR n&#xe3;o exclui o disparo (lavagem, tempo, tipo de muni&#xe7;&#xe3;o)","children":[],"payload":{"tag":"li","lines":"189,191"}}],"payload":{"tag":"h3","lines":"185,186"}}],"payload":{"tag":"h2","lines":"171,172"}},{"content":"8. LEGISLA&#xc7;&#xc3;O DE ARMAS [Prioridade B]","children":[{"content":"8.1 Estatuto do Desarmamento &#x2014; Lei 10.826/2003 [Prioridade B]","children":[{"content":"<strong>Porte ilegal de arma de fogo:</strong> art. 14 &#x2014; arma de uso permitido sem porte","children":[],"payload":{"tag":"li","lines":"196,197"}},{"content":"<strong>Posse irregular:</strong> art. 12 &#x2014; arma em casa/trabalho sem registro","children":[],"payload":{"tag":"li","lines":"197,198"}},{"content":"<strong>Tr&#xe1;fico de arma:</strong> art. 17 &#x2014; com&#xe9;rcio ilegal","children":[],"payload":{"tag":"li","lines":"198,199"}},{"content":"<strong>Arma de uso restrito:</strong> art. 16 &#x2014; apenas For&#xe7;as Armadas, PM, PRF, PF, Guardas Municipais (em munic&#xed;pios espec&#xed;ficos)","children":[],"payload":{"tag":"li","lines":"199,201"}}],"payload":{"tag":"h3","lines":"195,196"}},{"content":"8.2 Classifica&#xe7;&#xe3;o das Armas [Prioridade B]","children":[{"content":"<strong>Arma de uso permitido:</strong> calibres que n&#xe3;o s&#xe3;o de uso exclusivo das for&#xe7;as armadas (ex.: .38, .32, calibre .380, 9mm em situa&#xe7;&#xf5;es espec&#xed;ficas)","children":[],"payload":{"tag":"li","lines":"202,203"}},{"content":"<strong>Arma de uso restrito:</strong> calibres de uso exclusivo das for&#xe7;as de seguran&#xe7;a/militares (ex.: .357 Magnum, .40, .44 Magnum, .45, 9mm Parabellum em algumas classifica&#xe7;&#xf5;es)","children":[],"payload":{"tag":"li","lines":"203,204"}},{"content":"<strong>Arma de uso proibido:</strong> aquelas vedadas at&#xe9; para o Estado (fabrica&#xe7;&#xe3;o, com&#xe9;rcio e porte proibidos)","children":[],"payload":{"tag":"li","lines":"204,206"}}],"payload":{"tag":"h3","lines":"201,202"}}],"payload":{"tag":"h2","lines":"193,194"}},{"content":"QUADRO RESUMO &#x2014; APOSTAS DO DETETIVE","children":[{"content":"<table data-lines=\"210,222\">\n<thead data-lines=\"210,211\">\n<tr data-lines=\"210,211\">\n<th>Aposta</th>\n<th>Tema</th>\n<th>Prioridade</th>\n</tr>\n</thead>\n<tbody data-lines=\"212,222\">\n<tr data-lines=\"212,213\">\n<td>OE: bordas regulares + zona de enxugo sempre presente</td>\n<td>OE &#xd7; OS</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"213,214\">\n<td>OS: bordas irregulares + sem enxugo, sem tatuagem</td>\n<td>OE &#xd7; OS</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"214,215\">\n<td>Tatuagem = gr&#xe3;os de p&#xf3;lvora N&#xc3;O se lavam; s&#xf3; OE, s&#xf3; curta dist&#xe2;ncia</td>\n<td>Dist&#xe2;ncia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"215,216\">\n<td>Estrias do raiamento &#x2192; marcas &#xfa;nicas no proj&#xe9;til &#x2192; identifica&#xe7;&#xe3;o da arma</td>\n<td>Estrias</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"216,217\">\n<td>GSR: Pb + Ba + Sb; swab; at&#xe9; 6h; MEV-EDS</td>\n<td>GSR</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"217,218\">\n<td>Cartucho &#x2260; bala; cartucho = conjunto; bala = proj&#xe9;til</td>\n<td>Terminologia</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"218,219\">\n<td>Alma lisa = sem estrias; alma raiada = com estrias (pistola, rev&#xf3;lver)</td>\n<td>Armas</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"219,220\">\n<td>Tiro encostado: Bonnet + chamuscamento + tatuagem + lacera&#xe7;&#xf5;es estreladas</td>\n<td>Dist&#xe2;ncia</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"220,221\">\n<td>Estojo: marcas do percussor + c&#xe2;mara + extrator</td>\n<td>Identifica&#xe7;&#xe3;o</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"221,222\">\n<td>Vidro com orif&#xed;cio c&#xf4;nico: base maior no lado de sa&#xed;da = sentido do disparo</td>\n<td>Reconstitui&#xe7;&#xe3;o</td>\n<td>M&#xc9;DIA</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"210,222"}}],"payload":{"tag":"h2","lines":"208,209"}}],"payload":{"tag":"h1","lines":"6,7"}}]},null)</script>
