x2014; EXAME DE ESCRITA [Prioridade A]","children":[{"content":"2.1 Defini&#xe7;&#xe3;o [Prioridade A]","children":[{"content":"<strong>Grafoscopia (Graf&#xed;stica):</strong> exame da escrita cursiva (manuscrita) para identificar o autor","children":[],"payload":{"tag":"li","lines":"26,27"}},{"content":"Base cient&#xed;fica: a escrita de cada pessoa tem caracter&#xed;sticas &#xfa;nicas e relativamente est&#xe1;veis","children":[],"payload":{"tag":"li","lines":"27,29"}}],"payload":{"tag":"h3","lines":"25,26"}},{"content":"2.2 Princ&#xed;pios da Identifica&#xe7;&#xe3;o Grafosc&#xf3;pica [Prioridade A]","children":[{"content":"Princ&#xed;pio da Individualidade da Escrita","children":[{"content":"Cada pessoa desenvolve um estilo gr&#xe1;fico &#xfa;nico moldado por: anatomia, aprendizado, h&#xe1;bitos, estado emocional","children":[],"payload":{"tag":"li","lines":"32,33"}},{"content":"Mesmo em disfarce, caracter&#xed;sticas inconscientes se mant&#xea;m","children":[],"payload":{"tag":"li","lines":"33,35"}}],"payload":{"tag":"h4","lines":"31,32"}},{"content":"Caracter&#xed;sticas Gerais (Classe)","children":[{"content":"Compartilhadas por grupos que aprenderam juntos &#x2014; tipo de caligrafia escolar","children":[],"payload":{"tag":"li","lines":"36,37"}},{"content":"Diferenciam grupos, n&#xe3;o indiv&#xed;duos","children":[],"payload":{"tag":"li","lines":"37,39"}}],"payload":{"tag":"h4","lines":"35,36"}},{"content":"Caracter&#xed;sticas Individuais (Marcas Pessoais)","children":[{"content":"&#xda;nicas de cada escrevente","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"<strong>Press&#xe3;o:</strong> for&#xe7;a aplicada &#xe0; caneta &#x2014; profundidade e espessura do tra&#xe7;o","children":[],"payload":{"tag":"li","lines":"41,42"}},{"content":"<strong>Inclina&#xe7;&#xe3;o:</strong> &#xe2;ngulo das hastes verticais em rela&#xe7;&#xe3;o &#xe0; linha de base","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"<strong>Dimens&#xe3;o:</strong> tamanho relativo de letras e partes","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"<strong>Velocidade:</strong> ritmo da escrita &#x2014; tra&#xe7;os r&#xe1;pidos vs. lentos","children":[],"payload":{"tag":"li","lines":"44,45"}},{"content":"<strong>Forma:</strong> formato espec&#xed;fico de cada letra","children":[],"payload":{"tag":"li","lines":"45,46"}},{"content":"<strong>Dire&#xe7;&#xe3;o:</strong> inclina&#xe7;&#xe3;o geral da linha de escrita","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"<strong>Liga&#xe7;&#xe3;o:</strong> forma como as letras se conectam &#x2014; conectiva, desconectiva","children":[],"payload":{"tag":"li","lines":"47,48"}},{"content":"<strong>Ordem:</strong> organiza&#xe7;&#xe3;o do texto no espa&#xe7;o","children":[],"payload":{"tag":"li","lines":"48,50"}}],"payload":{"tag":"h4","lines":"39,40"}}],"payload":{"tag":"h3","lines":"29,30"}},{"content":"2.3 Padr&#xf5;es Grafosc&#xf3;picos Cobertos em Prova [Prioridade A]","children":[{"content":"<strong>Escrita aut&#xea;ntica:</strong> press&#xe3;o uniforme, velocidade constante, tra&#xe7;os espont&#xe2;neos","children":[],"payload":{"tag":"li","lines":"54,55"}},{"content":"<strong>Escrita disfar&#xe7;ada:</strong> mudan&#xe7;a intencional de caligrafia &#x2014; altera&#xe7;&#xf5;es em caracter&#xed;sticas gerais; as individuais tendem a persistir","children":[],"payload":{"tag":"li","lines":"55,56"}},{"content":"<strong>Escrita simulada:</strong> c&#xf3;pia de outra escrita &#x2014; tremor, lentid&#xe3;o, pausas artificiais, retoques","children":[],"payload":{"tag":"li","lines":"56,58"}}],"payload":{"tag":"h3","lines":"53,54"}},{"content":"2.4 Material Padr&#xe3;o para Compara&#xe7;&#xe3;o [Prioridade A]","children":[{"content":"<strong>Padr&#xe3;o antigo (pr&#xe9;-constitu&#xed;do):</strong> escrita coletada antes do fato em documentos preexistentes &#x2014; autenticidade garantida","children":[],"payload":{"tag":"li","lines":"62,63"}},{"content":"<strong>Padr&#xe3;o novo (post-constitu&#xed;do):</strong> coleta de escrita sob determina&#xe7;&#xe3;o da autoridade &#x2014; risco de disfarce","children":[],"payload":{"tag":"li","lines":"63,64"}},{"content":"<strong>Padr&#xe3;o ideal:</strong> combina&#xe7;&#xe3;o de ambos; m&#xed;nimo de 20 a 30 amostras de escrita","children":[],"payload":{"tag":"li","lines":"64,66"}}],"payload":{"tag":"h3","lines":"61,62"}}],"payload":{"tag":"h2","lines":"23,24"}},{"content":"3. FALSIFICA&#xc7;&#xc3;O DE DOCUMENTOS [Prioridade A]","children":[{"content":"3.1 Tipos de Falsifica&#xe7;&#xe3;o [Prioridade A]","children":[{"content":"Falsifica&#xe7;&#xe3;o Material","children":[{"content":"Altera&#xe7;&#xe3;o f&#xed;sica do documento existente","children":[],"payload":{"tag":"li","lines":"73,74"}},{"content":"Modalidades:","children":[{"content":"<strong>Rasura:</strong> remo&#xe7;&#xe3;o de parte do texto original (raspagem, abras&#xe3;o qu&#xed;mica)","children":[],"payload":{"tag":"li","lines":"75,76"}},{"content":"<strong>Acr&#xe9;scimo:</strong> adi&#xe7;&#xe3;o de texto, algarismos ou palavras ao documento","children":[],"payload":{"tag":"li","lines":"76,77"}},{"content":"<strong>Adultera&#xe7;&#xe3;o de impress&#xe3;o:</strong> altera&#xe7;&#xe3;o de fotografia, dados ou selos","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"<strong>Recorte e colagem (montagem):</strong> partes de documentos diferentes combinadas","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"<strong>Lavagem (apagamento qu&#xed;mico):</strong> solvente remove tinta sem danificar o papel","children":[],"payload":{"tag":"li","lines":"79,81"}}],"payload":{"tag":"li","lines":"74,81"}}],"payload":{"tag":"h4","lines":"72,73"}},{"content":"Falsifica&#xe7;&#xe3;o Ideol&#xf3;gica","children":[{"content":"O documento &#xe9; materialmente aut&#xea;ntico, mas o conte&#xfa;do &#xe9; falso","children":[],"payload":{"tag":"li","lines":"82,83"}},{"content":"A forma (papel, assinatura, carimbo) &#xe9; leg&#xed;tima; o conte&#xfa;do (informa&#xe7;&#xe3;o) &#xe9; mentiroso","children":[],"payload":{"tag":"li","lines":"83,84"}},{"content":"Exemplo: declara&#xe7;&#xe3;o m&#xe9;dica com papel e assinatura reais, mas informa&#xe7;&#xe3;o inventada","children":[],"payload":{"tag":"li","lines":"84,86"}}],"payload":{"tag":"h4","lines":"81,82"}}],"payload":{"tag":"h3","lines":"70,71"}},{"content":"3.2 T&#xe9;cnicas de Detec&#xe7;&#xe3;o [Prioridade A]","children":[{"content":"Exame Visual e Microsc&#xf3;pico","children":[{"content":"Lupa e estereomicrosc&#xf3;pio: rasuras, retoques, linhas sobrepostas","children":[],"payload":{"tag":"li","lines":"89,90"}},{"content":"Microsc&#xf3;pio comparativo: compara&#xe7;&#xe3;o de fibras de papel, tra&#xe7;os de tinta","children":[],"payload":{"tag":"li","lines":"90,92"}}],"payload":{"tag":"h4","lines":"88,89"}},{"content":"Luz Ultravioleta (UV) e Infravermelha (IV)","children":[{"content":"<strong>UV:</strong> revela apagamentos, fluoresc&#xea;ncia de tintas, autenticidade de pap&#xe9;is de seguran&#xe7;a","children":[],"payload":{"tag":"li","lines":"93,94"}},{"content":"<strong>IV:</strong> diferencia tintas de mesma cor aparente; revela escritas apagadas; atravessa algumas tintas","children":[],"payload":{"tag":"li","lines":"94,96"}}],"payload":{"tag":"h4","lines":"92,93"}},{"content":"Exame Qu&#xed;mico de Tintas &#x2014; Cromatografia","children":[{"content":"<strong>Cromatografia em camada delgada (CCD):</strong> separa componentes da tinta por velocidade de migra&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"97,98"}},{"content":"Identifica marca, lote e compatibilidade temporal entre trechos do mesmo documento","children":[],"payload":{"tag":"li","lines":"98,99"}},{"content":"<strong>HPLC:</strong> cromatografia l&#xed;quida de alta efici&#xea;ncia &#x2014; an&#xe1;lise mais precisa de tintas","children":[],"payload":{"tag":"li","lines":"99,101"}}],"payload":{"tag":"h4","lines":"96,97"}},{"content":"Exame do Papel","children":[{"content":"Fibras celul&#xf3;sicas: tipo de papel (kraft, couch&#xea;, offset, seguran&#xe7;a)","children":[],"payload":{"tag":"li","lines":"102,103"}},{"content":"Marca d&apos;&#xe1;gua: identifica fabricante e autenticidade","children":[],"payload":{"tag":"li","lines":"103,104"}},{"content":"Fluoresc&#xea;ncia: pap&#xe9;is de seguran&#xe7;a t&#xea;m fluoresc&#xea;ncia pr&#xf3;pria sob UV","children":[],"payload":{"tag":"li","lines":"104,105"}},{"content":"Data&#xe7;&#xe3;o: composi&#xe7;&#xe3;o qu&#xed;mica evolui com o tempo &#x2014; poss&#xed;vel estimar antiguidade","children":[],"payload":{"tag":"li","lines":"105,107"}}],"payload":{"tag":"h4","lines":"101,102"}}],"payload":{"tag":"h3","lines":"86,87"}},{"content":"3.3 Documentos de Seguran&#xe7;a [Prioridade B]","children":[{"content":"Elementos de seguran&#xe7;a incorporados para dificultar a falsifica&#xe7;&#xe3;o:","children":[{"content":"<strong>Marca d&apos;&#xe1;gua:</strong> varia&#xe7;&#xe3;o de espessura do papel &#x2014; vis&#xed;vel contra a luz","children":[],"payload":{"tag":"li","lines":"109,110"}},{"content":"<strong>Fio de seguran&#xe7;a:</strong> fio met&#xe1;lico ou pl&#xe1;stico embutido no papel","children":[],"payload":{"tag":"li","lines":"110,111"}},{"content":"<strong>Holograma:</strong> imagem que muda com o &#xe2;ngulo de vis&#xe3;o","children":[],"payload":{"tag":"li","lines":"111,112"}},{"content":"<strong>Guilhoch&#xe9;:</strong> padr&#xe3;o geom&#xe9;trico complexo de fundo &#x2014; dif&#xed;cil de reproduzir","children":[],"payload":{"tag":"li","lines":"112,113"}},{"content":"<strong>Tinta opticamente vari&#xe1;vel (OVI):</strong> muda de cor com o &#xe2;ngulo (ex.: dinheiro)","children":[],"payload":{"tag":"li","lines":"113,114"}},{"content":"<strong>Impress&#xe3;o em relevo (calcografia):</strong> tra&#xe7;o em relevo palp&#xe1;vel","children":[],"payload":{"tag":"li","lines":"114,116"}}],"payload":{"tag":"li","lines":"108,116"}}],"payload":{"tag":"h3","lines":"107,108"}}],"payload":{"tag":"h2","lines":"68,69"}},{"content":"4. EXAME DE ASSINATURAS [Prioridade A]","children":[{"content":"4.1 Conceito e Natureza [Prioridade A]","children":[{"content":"Assinatura = express&#xe3;o gr&#xe1;fica mais individualizada da escrita","children":[],"payload":{"tag":"li","lines":"121,122"}},{"content":"Mais dif&#xed;cil de falsificar que a escrita cursiva (mais automatizada, mais r&#xe1;pida)","children":[],"payload":{"tag":"li","lines":"122,123"}},{"content":"Caracter&#xed;sticas: tra&#xe7;ado, velocidade, press&#xe3;o, rubrica (parte ornamental), proporcionalidade","children":[],"payload":{"tag":"li","lines":"123,125"}}],"payload":{"tag":"h3","lines":"120,121"}},{"content":"4.2 Tipos de Falsifica&#xe7;&#xe3;o de Assinatura [Prioridade A]","children":[{"content":"<table data-lines=\"127,133\">\n<thead data-lines=\"127,128\">\n<tr data-lines=\"127,128\">\n<th>Tipo</th>\n<th>M&#xe9;todo</th>\n<th>Sinais de Detec&#xe7;&#xe3;o</th>\n</tr>\n</thead>\n<tbody data-lines=\"129,133\">\n<tr data-lines=\"129,130\">\n<td><strong>Autofalsifica&#xe7;&#xe3;o</strong></td>\n<td>Pr&#xf3;prio titular nega a assinatura</td>\n<td>Caracter&#xed;sticas individuais presentes</td>\n</tr>\n<tr data-lines=\"130,131\">\n<td><strong>Imita&#xe7;&#xe3;o livre</strong></td>\n<td>Mem&#xf3;ria sem modelo &#xe0; vista</td>\n<td>Tra&#xe7;ado espont&#xe2;neo mas com erros de forma</td>\n</tr>\n<tr data-lines=\"131,132\">\n<td><strong>Imita&#xe7;&#xe3;o a m&#xe3;o livre</strong></td>\n<td>Com modelo &#xe0; vista sem decalque</td>\n<td>Tremor de execu&#xe7;&#xe3;o lenta, retoques</td>\n</tr>\n<tr data-lines=\"132,133\">\n<td><strong>Decalque</strong></td>\n<td>Calco por tr&#xe1;s do papel &#x2014; decalca o tra&#xe7;ado</td>\n<td>Aus&#xea;ncia de velocidade, press&#xe3;o irregular, sulco no verso</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"127,133"}}],"payload":{"tag":"h3","lines":"125,126"}},{"content":"4.3 Confronto Grafosc&#xf3;pico de Assinaturas [Prioridade A]","children":[{"content":"Compara&#xe7;&#xe3;o de assinatura questionada com padr&#xe3;o aut&#xea;ntico","children":[],"payload":{"tag":"li","lines":"138,139"}},{"content":"Conclus&#xf5;es: reconhecimento (mesma pessoa), n&#xe3;o reconhecimento (pessoas diferentes), inconclusivo","children":[],"payload":{"tag":"li","lines":"139,141"}}],"payload":{"tag":"h3","lines":"137,138"}}],"payload":{"tag":"h2","lines":"118,119"}},{"content":"5. DATA&#xc7;&#xc3;O DE DOCUMENTOS [Prioridade B]","children":[{"content":"5.1 Data&#xe7;&#xe3;o Relativa [Prioridade B]","children":[{"content":"Determinar se o documento &#xe9; anterior ou posterior a determinado evento","children":[],"payload":{"tag":"li","lines":"146,147"}},{"content":"Compara&#xe7;&#xe3;o de tintas: tinta mais nova aparece sobre a mais velha nas sobreposi&#xe7;&#xf5;es","children":[],"payload":{"tag":"li","lines":"147,149"}}],"payload":{"tag":"h3","lines":"145,146"}},{"content":"5.2 Data&#xe7;&#xe3;o Absoluta [Prioridade B]","children":[{"content":"Estimativa do per&#xed;odo de produ&#xe7;&#xe3;o do documento","children":[],"payload":{"tag":"li","lines":"150,151"}},{"content":"T&#xe9;cnicas: an&#xe1;lise de solventes residuais da tinta (envelhecimento), fluoresc&#xea;ncia do papel, composi&#xe7;&#xe3;o qu&#xed;mica","children":[],"payload":{"tag":"li","lines":"151,152"}},{"content":"Limita&#xe7;&#xe3;o: margem de erro expressiva &#x2014; raramente uma data exata; normalmente uma faixa de anos","children":[],"payload":{"tag":"li","lines":"152,154"}}],"payload":{"tag":"h3","lines":"149,150"}}],"payload":{"tag":"h2","lines":"143,144"}},{"content":"6. INSTRUMENTOS DE EXAME [Prioridade B]","children":[{"content":"<table data-lines=\"158,167\">\n<thead data-lines=\"158,159\">\n<tr data-lines=\"158,159\">\n<th>Instrumento</th>\n<th>Aplica&#xe7;&#xe3;o</th>\n</tr>\n</thead>\n<tbody data-lines=\"160,167\">\n<tr data-lines=\"160,161\">\n<td>Lupa / Estereomicrosc&#xf3;pio</td>\n<td>Rasuras, retoques, sobreposi&#xe7;&#xf5;es de tra&#xe7;o</td>\n</tr>\n<tr data-lines=\"161,162\">\n<td>Microsc&#xf3;pio de compara&#xe7;&#xe3;o</td>\n<td>Compara&#xe7;&#xe3;o lado a lado de fragmentos</td>\n</tr>\n<tr data-lines=\"162,163\">\n<td>L&#xe2;mpada UV (365nm)</td>\n<td>Fluoresc&#xea;ncia de tintas e pap&#xe9;is; apagamentos</td>\n</tr>\n<tr data-lines=\"163,164\">\n<td>Luz infravermelha</td>\n<td>Diferencia&#xe7;&#xe3;o de tintas; escritas apagadas</td>\n</tr>\n<tr data-lines=\"164,165\">\n<td>Videospectro comparador (VSC)</td>\n<td>Multiespectr al &#x2014; UV, IV, vis&#xed;vel &#x2014; em equipamento &#xfa;nico</td>\n</tr>\n<tr data-lines=\"165,166\">\n<td>Cromat&#xf3;grafo</td>\n<td>An&#xe1;lise qu&#xed;mica de tintas</td>\n</tr>\n<tr data-lines=\"166,167\">\n<td>Microsc&#xf3;pio eletr&#xf4;nico (MEV)</td>\n<td>An&#xe1;lise de fibras de papel e pigmentos de tinta</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"158,167"}}],"payload":{"tag":"h2","lines":"156,157"}},{"content":"QUADRO RESUMO &#x2014; APOSTAS DO DETETIVE","children":[{"content":"<table data-lines=\"172,182\">\n<thead data-lines=\"172,173\">\n<tr data-lines=\"172,173\">\n<th>Aposta</th>\n<th>Tema</th>\n<th>Prioridade</th>\n</tr>\n</thead>\n<tbody data-lines=\"174,182\">\n<tr data-lines=\"174,175\">\n<td>8 caracter&#xed;sticas individuais da escrita (press&#xe3;o, inclina&#xe7;&#xe3;o, dimens&#xe3;o...)</td>\n<td>Grafoscopia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"175,176\">\n<td>Escrita disfar&#xe7;ada (muda a pr&#xf3;pria) &#xd7; simulada (copia a de outro)</td>\n<td>Grafoscopia</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"176,177\">\n<td>Decalque: sem velocidade, press&#xe3;o irregular, sulco no verso</td>\n<td>Assinatura</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"177,178\">\n<td>Falsifica&#xe7;&#xe3;o material &#xd7; ideol&#xf3;gica: material altera o suporte; ideol&#xf3;gica altera o conte&#xfa;do</td>\n<td>Falsifica&#xe7;&#xe3;o</td>\n<td>M&#xc1;XIMA</td>\n</tr>\n<tr data-lines=\"178,179\">\n<td>UV revela apagamentos e fluoresc&#xea;ncia; IV diferencia tintas e revela escritas</td>\n<td>T&#xe9;cnicas</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"179,180\">\n<td>Guilhoch&#xe9;, OVI, holograma, marca d&apos;&#xe1;gua, fio de seguran&#xe7;a = elementos de seguran&#xe7;a</td>\n<td>Documentos</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"180,181\">\n<td>Padr&#xe3;o antigo (pr&#xe9;-constitu&#xed;do) &#xe9; mais confi&#xe1;vel que o novo (post-constitu&#xed;do)</td>\n<td>Compara&#xe7;&#xe3;o</td>\n<td>ALTA</td>\n</tr>\n<tr data-lines=\"181,182\">\n<td>Cromatografia = an&#xe1;lise qu&#xed;mica de tintas &#x2014; identifica marca, lote e data&#xe7;&#xe3;o relativa</td>\n<td>Tintas</td>\n<td>M&#xc9;DIA</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"172,182"}}],"payload":{"tag":"h2","lines":"170,171"}}],"payload":{"tag":"h1","lines":"6,7"}}]},null)</script>
