,21"}},{"content":"An&#xe1;lise de tintas, solos e materiais desconhecidos","children":[],"payload":{"tag":"li","lines":"21,23"}}],"payload":{"tag":"h3","lines":"15,16"}}],"payload":{"tag":"h2","lines":"8,9"}},{"content":"2. DROGAS E ENTORPECENTES [Prioridade A &#x2014; MAIS COBRADO]","children":[{"content":"2.1 Legisla&#xe7;&#xe3;o &#x2014; Lei 11.343/2006 [Prioridade A]","children":[{"content":"<strong>Lei de Drogas:</strong> Lei 11.343/2006 (substitui as Leis 6.368/76 e 10.409/02)","children":[],"payload":{"tag":"li","lines":"28,29"}},{"content":"<strong>Art. 28:</strong> porte para uso pessoal &#x2014; n&#xe3;o h&#xe1; pena de pris&#xe3;o; penas: advert&#xea;ncia, medida educativa, presta&#xe7;&#xe3;o de servi&#xe7;os","children":[],"payload":{"tag":"li","lines":"29,30"}},{"content":"<strong>Art. 33:</strong> tr&#xe1;fico de drogas &#x2014; reclus&#xe3;o de 5 a 15 anos + multa","children":[],"payload":{"tag":"li","lines":"30,31"}},{"content":"<strong>Distin&#xe7;&#xe3;o tr&#xe1;fico &#xd7; uso pessoal:</strong> lei estabelece crit&#xe9;rios (quantidade, local, circunst&#xe2;ncias, antecedentes) &#x2014; <strong>n&#xe3;o h&#xe1; quantidade m&#xed;nima definida em lei</strong>","children":[],"payload":{"tag":"li","lines":"31,32"}},{"content":"A per&#xed;cia qu&#xed;mica confirma a natureza da subst&#xe2;ncia &#x2014; requisito obrigat&#xf3;rio para o processo","children":[],"payload":{"tag":"li","lines":"32,34"}}],"payload":{"tag":"h3","lines":"27,28"}},{"content":"2.2 Principais Drogas e M&#xe9;todos de An&#xe1;lise [Prioridade A]","children":[{"content":"Cannabinoides (Maconha, Haxixe)","children":[{"content":"<strong>Princ&#xed;pio ativo:</strong> THC (delta-9-tetrahidrocanabinol)","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"<strong>Teste de triagem (presumptivo):</strong> Duquenois-Levine &#x2192; colora&#xe7;&#xe3;o violeta em Cannabis","children":[],"payload":{"tag":"li","lines":"38,39"}},{"content":"<strong>Confirma&#xe7;&#xe3;o:</strong> CG-MS (cromatografia gasosa acoplada a espectrometria de massas)","children":[],"payload":{"tag":"li","lines":"39,40"}},{"content":"Matriz: folha, flor, resina (haxixe), &#xf3;leo","children":[],"payload":{"tag":"li","lines":"40,42"}}],"payload":{"tag":"h4","lines":"36,37"}},{"content":"Coca&#xed;na e Crack","children":[{"content":"<strong>Base:</strong> alcaloide extra&#xed;do da folha de Erythroxylum coca","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"<strong>Crack:</strong> coca&#xed;na base &#x2014; fum&#xe1;vel &#x2014; mais addictiva","children":[],"payload":{"tag":"li","lines":"44,45"}},{"content":"<strong>Teste de triagem:</strong> Scotts (tiocianato de cobalto) &#x2192; azul intenso com coca&#xed;na","children":[],"payload":{"tag":"li","lines":"45,46"}},{"content":"<strong>Confirma&#xe7;&#xe3;o:</strong> CG-MS; HPLC","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"<strong>Adulterantes comuns:</strong> lidoca&#xed;na, levamisol, fenacetina &#x2014; a banca pode cobrar","children":[],"payload":{"tag":"li","lines":"47,49"}}],"payload":{"tag":"h4","lines":"42,43"}},{"content":"Anfetaminas e Metanfetaminas (ATS)","children":[{"content":"<strong>Grupo:</strong> estimulantes do SNC &#x2014; MDMA (ecstasy), metanfetamina (ice), anfetamina","children":[],"payload":{"tag":"li","lines":"50,51"}},{"content":"<strong>Teste de triagem:</strong> Marquis &#x2192; colora&#xe7;&#xe3;o laranja-marrom para anfetaminas; roxo-violeta para MDMA","children":[],"payload":{"tag":"li","lines":"51,52"}},{"content":"<strong>Confirma&#xe7;&#xe3;o:</strong> CG-MS; HPLC","children":[],"payload":{"tag":"li","lines":"52,54"}}],"payload":{"tag":"h4","lines":"49,50"}},{"content":"Hero&#xed;na e Opioides","children":[{"content":"<strong>Base:</strong> morfina derivada do &#xf3;pio &#x2014; semissint&#xe9;tico (hero&#xed;na) ou sint&#xe9;tico (fentanil)","children":[],"payload":{"tag":"li","lines":"55,56"}},{"content":"<strong>Teste de triagem:</strong> Marquis &#x2192; roxo para opioides","children":[],"payload":{"tag":"li","lines":"56,57"}},{"content":"<strong>Confirma&#xe7;&#xe3;o:</strong> CG-MS","children":[],"payload":{"tag":"li","lines":"57,59"}}],"payload":{"tag":"h4","lines":"54,55"}},{"content":"Benzodiazep&#xed;nicos (Rohypnol, Clonazepam)","children":[{"content":"Depressores do SNC &#x2014; uso em crimes sexuais (&quot;boa noite cinderela&quot;)","children":[],"payload":{"tag":"li","lines":"60,61"}},{"content":"An&#xe1;lise: HPLC ou imunoensaio","children":[],"payload":{"tag":"li","lines":"61,63"}}],"payload":{"tag":"h4","lines":"59,60"}}],"payload":{"tag":"h3","lines":"34,35"}},{"content":"2.3 Etapas da An&#xe1;lise de Drogas [Prioridade A]","children":[{"content":"An&#xe1;lise Presumptiva (Triagem) &#x2014; CAMPO","children":[{"content":"Teste colorim&#xe9;trico r&#xe1;pido no local ou delegacia","children":[],"payload":{"tag":"li","lines":"66,67"}},{"content":"Resultado n&#xe3;o &#xe9; conclusivo &#x2014; apenas orienta&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"67,68"}},{"content":"Positivo &#x2192; material para laborat&#xf3;rio","children":[],"payload":{"tag":"li","lines":"68,70"}}],"payload":{"tag":"h4","lines":"65,66"}},{"content":"An&#xe1;lise Confirmat&#xf3;ria &#x2014; LABORAT&#xd3;RIO","children":[{"content":"<strong>CG-MS</strong> (Cromatografia Gasosa &#x2014; Espectrometria de Massas): padr&#xe3;o-ouro para identifica&#xe7;&#xe3;o de drogas &#x2014; identifica e quantifica com alta sensibilidade","children":[],"payload":{"tag":"li","lines":"71,72"}},{"content":"<strong>HPLC</strong> (Cromatografia L&#xed;quida de Alta Efici&#xea;ncia): para subst&#xe2;ncias n&#xe3;o vol&#xe1;teis","children":[],"payload":{"tag":"li","lines":"72,73"}},{"content":"<strong>RMN</strong> (Resson&#xe2;ncia Magn&#xe9;tica Nuclear): estrutura molecular completa &#x2014; menos usado rotineiramente","children":[],"payload":{"tag":"li","lines":"73,75"}}],"payload":{"tag":"h4","lines":"70,71"}}],"payload":{"tag":"h3","lines":"63,64"}}],"payload":{"tag":"h2","lines":"25,26"}},{"content":"3. TOXICOLOGIA &#x2014; VENENOS E T&#xd3;XICOS [Prioridade A]","children":[{"content":"3.1 Conceitos Toxicol&#xf3;gicos [Prioridade A]","children":[{"content":"<strong>Veneno:</strong> subst&#xe2;ncia que em pequena quantidade causa morte ou dano grave","children":[],"payload":{"tag":"li","lines":"83,84"}},{"content":"<strong>Dose letal (DL50):</strong> dose que mata 50% dos animais testados &#x2014; par&#xe2;metro de toxicidade aguda","children":[],"payload":{"tag":"li","lines":"84,85"}},{"content":"<strong>Dose m&#xed;nima letal:</strong> menor quantidade capaz de causar morte","children":[],"payload":{"tag":"li","lines":"85,86"}},{"content":"Quanto menor a DL50, mais t&#xf3;xica &#xe9; a subst&#xe2;ncia","children":[],"payload":{"tag":"li","lines":"86,87"}},{"content":"<strong>Toxicocin&#xe9;tica:</strong> o que o organismo faz com o t&#xf3;xico (absor&#xe7;&#xe3;o, distribui&#xe7;&#xe3;o, metabolismo, excre&#xe7;&#xe3;o &#x2014; ADME)","children":[],"payload":{"tag":"li","lines":"87,88"}},{"content":"<strong>Toxicodin&#xe2;mica:</strong> o que o t&#xf3;xico faz com o organismo (mecanismo de a&#xe7;&#xe3;o)","children":[],"payload":{"tag":"li","lines":"88,90"}}],"payload":{"tag":"h3","lines":"82,83"}},{"content":"3.2 Vias de Entrada do T&#xf3;xico [Prioridade A]","children":[{"content":"<strong>Ingest&#xe3;o (oral):</strong> via mais comum &#x2014; absor&#xe7;&#xe3;o gastrointestinal","children":[],"payload":{"tag":"li","lines":"91,92"}},{"content":"<strong>Inala&#xe7;&#xe3;o:</strong> vapores, gases, aeross&#xf3;is &#x2014; absor&#xe7;&#xe3;o pulmonar &#x2014; mais r&#xe1;pida","children":[],"payload":{"tag":"li","lines":"92,93"}},{"content":"<strong>Absor&#xe7;&#xe3;o d&#xe9;rmica (percut&#xe2;nea):</strong> atrav&#xe9;s da pele &#x2014; organofosforados, solventes","children":[],"payload":{"tag":"li","lines":"93,94"}},{"content":"<strong>Inje&#xe7;&#xe3;o (parenteral):</strong> intravenosa, intramuscular &#x2014; mais r&#xe1;pida de todas","children":[],"payload":{"tag":"li","lines":"94,96"}}],"payload":{"tag":"h3","lines":"90,91"}},{"content":"3.3 Amostras Biol&#xf3;gicas e Janelas de Detec&#xe7;&#xe3;o [Prioridade A]","children":[{"content":"<table data-lines=\"101,110\">\n<thead data-lines=\"101,102\">\n<tr data-lines=\"101,102\">\n<th>Amostra</th>\n<th>Janela de Detec&#xe7;&#xe3;o</th>\n<th>Uso principal</th>\n</tr>\n</thead>\n<tbody data-lines=\"103,110\">\n<tr data-lines=\"103,104\">\n<td><strong>Sangue</strong></td>\n<td>Horas a dias</td>\n<td>T&#xf3;xicos recentes; n&#xed;vel de intoxica&#xe7;&#xe3;o</td>\n</tr>\n<tr data-lines=\"104,105\">\n<td><strong>Urina</strong></td>\n<td>1 a 7 dias (mais ampla)</td>\n<td>Triagem de drogas de abuso</td>\n</tr>\n<tr data-lines=\"105,106\">\n<td><strong>Cabelo</strong></td>\n<td>At&#xe9; <strong>90 dias</strong> (~ 1cm/m&#xea;s)</td>\n<td>Hist&#xf3;rico de uso cr&#xf4;nico</td>\n</tr>\n<tr data-lines=\"106,107\">\n<td><strong>Humor v&#xed;treo</strong></td>\n<td>Vari&#xe1;vel</td>\n<td>Resiste &#xe0; putrefa&#xe7;&#xe3;o &#x2014; cad&#xe1;veres decompostos</td>\n</tr>\n<tr data-lines=\"107,108\">\n<td><strong>Bile</strong></td>\n<td>Dias</td>\n<td>Concentra&#xe7;&#xe3;o de subst&#xe2;ncias metabolizadas</td>\n</tr>\n<tr data-lines=\"108,109\">\n<td><strong>Conte&#xfa;do g&#xe1;strico</strong></td>\n<td>Horas</td>\n<td>Ingest&#xe3;o oral recente &#x2014; t&#xf3;xico n&#xe3;o absorvido</td>\n</tr>\n<tr data-lines=\"109,110\">\n<td><strong>Osso / Unhas</strong></td>\n<td>Meses a anos</td>\n<td>Exposi&#xe7;&#xe3;o cr&#xf4;nica (metais pesados)</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"101,110"}}],"payload":{"tag":"h3","lines":"99,100"}},{"content":"3.4 Principais Grupos de Venenos [Prioridade A]","children":[{"content":"Organofosforados e Carbamatos (Agrot&#xf3;xicos)","children":[{"content":"Inibidores da acetilcolinesterase &#x2192; ac&#xfa;mulo de acetilcolina &#x2192; superestimula&#xe7;&#xe3;o colin&#xe9;rgica","children":[],"payload":{"tag":"li","lines":"117,118"}},{"content":"<strong>S&#xed;ndrome colin&#xe9;rgica:</strong> saliva&#xe7;&#xe3;o, lacrimejamento, urinar involunt&#xe1;rio, defeca&#xe7;&#xe3;o, bradicardia, broncospasmo &#x2014; mnem&#xf4;nico: SLUDGE (Salivation, Lacrimation, Urination, Defecation, GI distress, Emesis)","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"<strong>Ant&#xed;doto:</strong> atropina (bloqueia os receptores muscar&#xed;nicos)","children":[],"payload":{"tag":"li","lines":"119,121"}}],"payload":{"tag":"h4","lines":"116,117"}},{"content":"Cianeto","children":[{"content":"Inibe a citocromo oxidase &#x2192; impede a respira&#xe7;&#xe3;o celular &#x2192; morte celular por &quot;asfixia qu&#xed;mica&quot;","children":[],"payload":{"tag":"li","lines":"122,123"}},{"content":"Pele rosa-avermelhada (sangue oxigenado em veias) &#x2014; sinal caracter&#xed;stico","children":[],"payload":{"tag":"li","lines":"123,124"}},{"content":"Cheiro de am&#xea;ndoas amargas no local","children":[],"payload":{"tag":"li","lines":"124,125"}},{"content":"<strong>Ant&#xed;doto:</strong> hidroxicobalamina (vit. B12) ou nitrito + tiossulfato de s&#xf3;dio","children":[],"payload":{"tag":"li","lines":"125,127"}}],"payload":{"tag":"h4","lines":"121,122"}},{"content":"Mon&#xf3;xido de Carbono (CO)","children":[{"content":"Liga-se &#xe0; hemoglobina com afinidade 250x maior que o O2 &#x2192; carboxiemoglobina &#x2192; hip&#xf3;xia","children":[],"payload":{"tag":"li","lines":"128,129"}},{"content":"Pele/mucosas <strong>rosa-cereja</strong> (carboxiemoglobina &#xe9; vermelho-brilhante)","children":[],"payload":{"tag":"li","lines":"129,130"}},{"content":"Causa mais comum: inc&#xea;ndios, g&#xe1;s de escapamento em ambientes fechados","children":[],"payload":{"tag":"li","lines":"130,131"}},{"content":"Diagn&#xf3;stico: dosagem de carboxiemoglobina no sangue","children":[],"payload":{"tag":"li","lines":"131,133"}}],"payload":{"tag":"h4","lines":"127,128"}},{"content":"Etanol (&#xc1;lcool Et&#xed;lico)","children":[{"content":"Depressor do SNC &#x2014; doses progressivas: desinibi&#xe7;&#xe3;o &#x2192; ataxia &#x2192; sonol&#xea;ncia &#x2192; coma &#x2192; morte","children":[],"payload":{"tag":"li","lines":"137,138"}},{"content":"<strong>Baf&#xf4;metro:</strong> inala&#xe7;&#xe3;o de ar alveolar &#x2014; correla&#xe7;&#xe3;o com n&#xed;vel s&#xe9;rico de etanol","children":[],"payload":{"tag":"li","lines":"138,139"}},{"content":"<strong>Retro&#xe1;lculo de Widmark:</strong> estima o n&#xed;vel de &#xe1;lcool no momento do fato a partir de coleta posterior","children":[],"payload":{"tag":"li","lines":"139,140"}},{"content":"<strong>Dosagem:</strong> imunoensaio (triagem) ou cromatografia gasosa (confirmat&#xf3;rio &#x2014; padr&#xe3;o-ouro)","children":[],"payload":{"tag":"li","lines":"140,142"}}],"payload":{"tag":"h4","lines":"136,137"}}],"payload":{"tag":"h3","lines":"114,115"}}],"payload":{"tag":"h2","lines":"80,81"}},{"content":"4. AN&#xc1;LISE DE ACELERANTES DE INC&#xca;NDIO [Prioridade A]","children":[{"content":"4.1 Acelerantes &#x2014; Defini&#xe7;&#xe3;o e Tipos [Prioridade A]","children":[{"content":"<strong>Acelerante:</strong> subst&#xe2;ncia inflam&#xe1;vel adicionada para iniciar ou expandir um inc&#xea;ndio criminoso","children":[],"payload":{"tag":"li","lines":"147,148"}},{"content":"Tipos comuns: gasolina, querosene, &#xe1;lcool, thinner, acetona, benzeno","children":[],"payload":{"tag":"li","lines":"148,150"}}],"payload":{"tag":"h3","lines":"146,147"}},{"content":"4.2 Coleta de Evid&#xea;ncias de Acelerante [Prioridade A]","children":[{"content":"Amostras de solo, madeira carbonizada, tecidos &#x2014; coletadas nas &#xe1;reas de maior queima","children":[],"payload":{"tag":"li","lines":"151,152"}},{"content":"Acondicionamento: <strong>recipiente herm&#xe9;tico met&#xe1;lico</strong> (lata lacrada) &#x2014; pl&#xe1;stico deixa difundir os vol&#xe1;teis","children":[],"payload":{"tag":"li","lines":"152,153"}},{"content":"<strong>N&#xc3;O usar sacos pl&#xe1;sticos</strong> para acelerantes &#x2014; perda dos compostos vol&#xe1;teis por permea&#xe7;&#xe3;o","children":[],"payload":{"tag":"li","lines":"153,155"}}],"payload":{"tag":"h3","lines":"150,151"}},{"content":"4.3 An&#xe1;lise de Acelerantes [Prioridade A]","children":[{"content":"<strong>CG-MS:</strong> separa&#xe7;&#xe3;o e identifica&#xe7;&#xe3;o dos hidrocarbonetos do acelerante &#x2014; padr&#xe3;o-ouro","children":[],"payload":{"tag":"li","lines":"156,157"}},{"content":"Headspace: volatiliza os componentes da amostra para an&#xe1;lise sem destrui&#xe7;&#xe3;o do s&#xf3;lido","children":[],"payload":{"tag":"li","lines":"157,158"}},{"content":"Resultado: perfil cromatogr&#xe1;fico do produto &#x2014; permite identificar o tipo de acelerante","children":[],"payload":{"tag":"li","lines":"158,160"}}],"payload":{"tag":"h3","lines":"155,156"}}],"payload":{"tag":"h2","lines":"144,145"}},{"content":"5. AN&#xc1;LISE DE EXPLOSIVOS [Prioridade B]","children":[{"content":"5.1 Res&#xed;duos de Explosivos [Prioridade B]","children":[{"content":"Compostos nitrogenados (TNT, RDX, PETN) &#x2014; detectados por cromatografia e espectrometria","children":[],"payload":{"tag":"li","lines":"168,169"}},{"content":"Res&#xed;duo no local da explos&#xe3;o e nas m&#xe3;os/roupas do suspeito","children":[],"payload":{"tag":"li","lines":"169,170"}},{"content":"An&#xe1;lise: HPLC-UV ou LC-MS/MS (espectrometria de massas em tandem)","children":[],"payload":{"tag":"li","lines":"170,172"}}],"payload":{"tag":"h3","lines":"167,168"}},{"content":"5.2 Tipos de Explosivos [Prioridade B]","children":[{"content":"<strong>Alto explosivo:</strong> detona&#xe7;&#xe3;o &#x2014; onda de choque supers&#xf4;nica (TNT, C-4, RDX)","children":[],"payload":{"tag":"li","lines":"173,174"}},{"content":"<strong>Baixo explosivo:</strong> deflagra&#xe7;&#xe3;o &#x2014; combust&#xe3;o r&#xe1;pida sem onda de choque (p&#xf3;lvora negra, smokeless powder)","children":[],"payload":{"tag":"li","lines":"174,176"}}],"payload":{"tag":"h3","lines":"172,173"}}],"payload":{"tag":"h2","lines":"165,166"}},{"content":"6. GSR &#x2014; RES&#xcd;DUO DE DISPARO (PERSPECTIVA QU&#xcd;MICA) [Prioridade A]","children":[{"content":"6.1 Composi&#xe7;&#xe3;o Qu&#xed;mica do GSR [Prioridade A]","children":[{"content":"<strong>Tr&#xed;ade GSR:</strong> Pb (chumbo) + Ba (b&#xe1;rio) + Sb (antim&#xf4;nio)","children":[],"payload":{"tag":"li","lines":"181,182"}},{"content":"Originados do escorvamento (primer) &#x2014; compostos de chumbo, b&#xe1;rio e antim&#xf4;nio","children":[],"payload":{"tag":"li","lines":"182,183"}},{"content":"Part&#xed;culas &#xfa;nicas (morfologia esf&#xe9;rica) com os tr&#xea;s elementos em conjunto &#x2014; confirmat&#xf3;rio","children":[],"payload":{"tag":"li","lines":"183,185"}}],"payload":{"tag":"h3","lines":"180,181"}},{"content":"6.2 Coleta e An&#xe1;lise [Prioridade A]","children":[{"content":"Coleta: swab com fita adesiva de carbono ou swab &#xfa;mido &#x2014; dorso e interdigital","children":[],"payload":{"tag":"li","lines":"186,187"}},{"content":"An&#xe1;lise: <strong>MEV-EDS</strong> &#x2014; morfologia + composi&#xe7;&#xe3;o elementar","children":[],"payload":{"tag":"li","lines":"187,188"}},{"content":"Part&#xed;cula GSR confirmat&#xf3;ria = esf&#xe9;rica + Pb + Ba + Sb na mesma part&#xed;cula","children":[],"payload":{"tag":"li","lines":"188,189"}},{"content":"Part&#xed;cula GSR indicativa = esf&#xe9;rica + dois dos tr&#xea;s elementos","children":[],"payload":{"tag":"li","lines":"189,191"}}],"payload":{"tag":"h3","lines":"185,186"}}],"payload":{"tag":"h2","lines":"178,179"}},{"content":"QUADRO RESUMO &#x2014; APOSTAS DO DETETIVE","children":[{"content":"<table data-lines=\"195,208\">\n<thead data-lines=\"195,196\">\n<tr data-lines=\"195,196\">\n<th>Aposta</th>\n<th>Tema</th>\n<th>Prioridade</th>\n</tr>\n</thead>\n<tbody data-lines=\"197,208\">\n<
